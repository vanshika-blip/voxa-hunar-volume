// ─────────────────────────────────────────────────────────────
// INTERVIEW LINEUP VIEW
// ─────────────────────────────────────────────────────────────

const IL_SELECTION_OPTS = ["FB Pending","Telephonic","VC","F2F","Finals","Process","Reject","TL Reject","Interview Reject","Position on hold","Position Closed","Offered","Joined","Backout","Offer Backout","Duplicate","Use Later","On Hold","Drop"];
const IL_TURNUP_OPTS    = ["Interview Scheduled","Interview Completed","No Show / Not Interested Now","Rejected (After Interview)","Selected / Offer in Process","Backout (Post Offer)"];

function InterviewLineupView({ user }) {
  const [rows,    setRows]    = useState([]);
  const [loading, setLoading] = useState(true);
  const [timeFil, setTimeFil] = useState("7d");
  const [savingCell, setSavingCell] = useState({}); // { "callId|col": "saving"|"ok" }

  async function load() {
    setLoading(true);
    const r = await api("getInterviewLineup", {});
    setLoading(false);
    if (r.ok) setRows(r.rows || []);
  }
  useEffect(() => { load(); }, []);
  useEffect(() => {
    const t = setInterval(load, 5 * 60 * 1000);
    return () => clearInterval(t);
  }, []);

  async function handleUpdate(callId, field, value) {
    if (!callId) return;
    const k = callId + "|" + field;
    setRows(prev => prev.map(r =>
      String(r["Call ID"]) === callId ? {...r, [field]: value} : r
    ));
    setSavingCell(p => ({...p, [k]: "saving"}));
    const res = await api("updateInterviewLead", { callId, fields: { [field]: value } });
    if (!res.ok) { load(); setSavingCell(p => { const n = {...p}; delete n[k]; return n; }); return; }
    setSavingCell(p => ({...p, [k]: "ok"}));
    setTimeout(() => setSavingCell(p => { const n = {...p}; delete n[k]; return n; }), 1200);
  }

  const filteredByTime = useMemo(() => {
    if (timeFil === "all") return rows;
    const cutoff = new Date();
    if (timeFil === "today") cutoff.setHours(0,0,0,0);
    else { cutoff.setDate(cutoff.getDate() - (timeFil === "7d" ? 7 : 30)); cutoff.setHours(0,0,0,0); }
    return rows.filter(r => {
      const d = r["Date Added"];
      if (!d || String(d).trim() === "") return timeFil === "all";
      try {
        const parsed = new Date(d);
        if (isNaN(parsed.getTime())) return timeFil === "all";
        return parsed >= cutoff;
      } catch { return false; }
    });
  }, [rows, timeFil]);

  function countFor(days) {
    if (days < 0) return rows.length;
    const cutoff = new Date();
    if (days === 0) cutoff.setHours(0,0,0,0);
    else { cutoff.setDate(cutoff.getDate()-days); cutoff.setHours(0,0,0,0); }
    return rows.filter(r => {
      const d = r["Date Added"];
      if (!d) return false;
      try { return new Date(d) >= cutoff; } catch { return false; }
    }).length;
  }

  // EXACT column order requested
  const shownCols = [
    "Month","Date Added","Assigned Recruiter Email",
    "Source","Callee Name","Mobile Number",
    "Agent Code","Campaign Name",
    "Selection Process","Turnup Status",
    "Assigned Recruiter Name",
    "Client",
    "Email","DOB","Qualification","Work Experience",
    "Current CTC","Expected CTC","Notice Period",
    "Role","Location","CIBIL Score",
    "SPOC Name","Current Employer","CV Link",
  ];

  const EDITABLE_FIELDS = new Set([
    "Selection Process","Turnup Status",
    "Client","Email","DOB","Qualification","Work Experience",
    "Current CTC","Expected CTC","Notice Period",
    "Role","Location","CIBIL Score",
    "SPOC Name","Current Employer","CV Link",
  ]);

  // Use only filterable text-ish cols, not free-text long fields
  const FILTER_COLS = [
    "Source","Callee Name","Mobile Number","Client","Role",
    "Agent Code","Selection Process","Turnup Status","Assigned Recruiter Name","Month",
  ];
  const { filters, filtered, colValues, setColFilter, clearFilters } = useTableFilters(filteredByTime, FILTER_COLS);
  const hasFilters = Object.keys(filters).length > 0;

  const totalCount     = rows.length;
  const scheduledCount = rows.filter(r => String(r["Turnup Status"]||"").toLowerCase().includes("scheduled")).length;
  const completedCount = rows.filter(r => String(r["Turnup Status"]||"").toLowerCase().includes("completed")).length;
  const joinedCount    = rows.filter(r => {
    const sp = String(r["Selection Process"]||"").toLowerCase();
    return sp.includes("joined") || sp.includes("offered");
  }).length;

  const TIME_TABS = [
    {id:"today", label:"Today",        count:countFor(0)},
    {id:"7d",    label:"Last 7 days",  count:countFor(7)},
    {id:"30d",   label:"Last 30 days", count:countFor(30)},
    {id:"all",   label:"All time",     count:totalCount},
  ];

  function canEdit(row) {
    const ae = String(row["Assigned Recruiter Email"]||"").toLowerCase();
    return ae === user.email.toLowerCase()
      || user.role === "team_lead"
      || user.role === "individual_contributor"
      || user.role === "super_admin";
  }

  // Inline editable text/number/date input — debounced save on blur
  function InlineEdit({ row, col, type = "text" }) {
    const callId = String(row["Call ID"] || "");
    const initial = row[col] == null ? "" : String(row[col]);
    const [val, setVal] = useState(initial);
    const [focused, setFocused] = useState(false);
    useEffect(() => { if (!focused) setVal(initial); }, [initial, focused]);
    const k = callId + "|" + col;
    const status = savingCell[k];
    return (
      <div style={{position:"relative",width:"100%"}}>
        <input
          type={type}
          value={val}
          onChange={e=>setVal(e.target.value)}
          onFocus={()=>setFocused(true)}
          onBlur={()=>{
            setFocused(false);
            if (val !== initial) handleUpdate(callId, col, val);
          }}
          style={{
            width:"100%",
            border:"1px solid transparent",
            background:"transparent",
            padding:"3px 6px",
            fontSize:11,
            fontFamily: col === "Mobile Number" || col === "CIBIL Score" || col === "Current CTC" || col === "Expected CTC" ? "var(--fm)" : "var(--fb)",
            color:val?"var(--black)":"#bbb",
            outline:"none",
            borderRadius:2,
          }}
          onMouseEnter={e=>e.currentTarget.style.border="1px solid #ddd"}
          onMouseLeave={e=>e.currentTarget.style.border="1px solid transparent"}
          placeholder="—"
        />
        {status === "saving" && (
          <span style={{position:"absolute",right:4,top:"50%",transform:"translateY(-50%)",fontSize:9,color:"var(--blue)",fontFamily:"var(--fm)"}}>…</span>
        )}
        {status === "ok" && (
          <span style={{position:"absolute",right:4,top:"50%",transform:"translateY(-50%)",fontSize:11,color:"var(--green)"}}>✓</span>
        )}
      </div>
    );
  }

  function formatStartedAt(v) { return fmtDT(v); }

  function formatMonth(v) {
    if (!v) return "";
    const s = String(v).trim();
    // Already 'yyyy-MM'? Show 'Mon yyyy'
    const m = s.match(/^(\d{4})-(\d{2})/);
    if (m) {
      const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
      const mi = parseInt(m[2],10)-1;
      if (mi >= 0 && mi < 12) return months[mi] + " " + m[1];
    }
    try {
      const d = new Date(s);
      if (!isNaN(d.getTime())) {
        return d.toLocaleDateString("en-IN",{month:"short",year:"numeric"});
      }
    } catch {}
    return s;
  }

  function renderCell(col, val, row) {
    const callId  = String(row["Call ID"] || "");
    const strVal  = val == null ? "" : String(val);
    const editable = canEdit(row);

    if (col === "Source") {
      const isAI = !strVal || strVal === "AI";
      return <span className={"t-pill " + (isAI ? "t-pill-blue" : "t-pill-gray")}>{isAI ? "AI" : "Manual"}</span>;
    }
    if (col === "Selection Process") {
      return editable
        ? <StatusSelect options={IL_SELECTION_OPTS} value={strVal} onChange={v => handleUpdate(callId,"Selection Process",v)}/>
        : <LeadPill value={strVal}/>;
    }
    if (col === "Turnup Status") {
      return editable
        ? <StatusSelect options={IL_TURNUP_OPTS} value={strVal} onChange={v => handleUpdate(callId,"Turnup Status",v)}/>
        : <LeadPill value={strVal}/>;
    }
    if (col === "Date Added") return <DateCell value={strVal}/>;
    if (col === "Started At") {
      const f = formatStartedAt(strVal);
      return f ? <span style={{fontSize:10,fontFamily:"var(--fm)",color:"var(--muted)"}}>{f}</span> : <span style={{color:"#ccc"}}>—</span>;
    }
    if (col === "Month") {
      const f = formatMonth(strVal);
      return f ? <span className="t-mono" style={{fontSize:10,color:"var(--muted)"}}>{f}</span> : <span style={{color:"#ccc"}}>—</span>;
    }
    if (col === "CV Link") {
      if (editable) return <InlineEdit row={row} col={col}/>;
      if (!strVal) return <span style={{color:"#ccc"}}>—</span>;
      return <a href={strVal} target="_blank" rel="noreferrer" style={{fontSize:10,fontFamily:"var(--fm)",color:"var(--blue)",textDecoration:"underline",wordBreak:"break-all"}}>{strVal.length>30?strVal.slice(0,30)+"…":strVal}</a>;
    }
    if (col === "DOB") {
      if (editable) return <InlineEdit row={row} col={col} type="date"/>;
      if (!strVal) return <span style={{color:"#ccc"}}>—</span>;
      try {
        const d = new Date(strVal);
        if (!isNaN(d.getTime())) return <span style={{fontSize:11,fontFamily:"var(--fm)"}}>{d.toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"})}</span>;
      } catch {}
      return <span style={{fontSize:11}}>{strVal}</span>;
    }
    if (EDITABLE_FIELDS.has(col) && editable) {
      return <InlineEdit row={row} col={col}/>;
    }
    if (!strVal) return <span style={{color:"#ccc"}}>—</span>;
    if (col === "Mobile Number" || col === "Call ID" || col === "Request ID" || col === "Agent Code") {
      return <span className="t-mono" style={{fontSize:10}}>{strVal}</span>;
    }
    if (col === "Assigned Recruiter Email") {
      return <span style={{fontSize:10,fontFamily:"var(--fm)",color:"var(--muted)"}}>{strVal}</span>;
    }
    return <span style={{fontSize:11}}>{strVal}</span>;
  }

  // Per-column min widths for nice layout
  const COL_WIDTHS = {
    "Source": 60, "Call ID": 110, "Callee Name": 120, "Mobile Number": 100,
    "Agent Code": 90, "Agent Name": 110, "Campaign Name": 130, "Request ID": 130,
    "Started At": 130, "Month": 80,
    "Selection Process": 150, "Turnup Status": 150,
    "Assigned Recruiter Email": 150, "Assigned Recruiter Name": 110,
    "Client": 110, "Email": 140, "DOB": 110, "Qualification": 120, "Work Experience": 100,
    "Current CTC": 90, "Expected CTC": 90, "Notice Period": 90,
    "Role": 100, "Location": 100, "CIBIL Score": 80,
    "SPOC Name": 110, "Current Employer": 130, "CV Link": 150,
    "Date Added": 110,
  };

  return (
    <div className="t-fade" style={{display:"flex",flexDirection:"column",minHeight:"calc(100vh - 48px)"}}>
      <div className="t-mast">
        <div>
          <div className="t-mast-title">Interview Lineup</div>
          <div className="t-mast-sub">
            {totalCount} candidates · {scheduledCount} scheduled · {joinedCount} joined/offered
          </div>
        </div>
        <div className="t-mast-r">
          {hasFilters && (
            <button className="t-btn t-btn-sm" style={{background:"var(--yellow)",color:"var(--black)",border:"none"}} onClick={clearFilters}>
              Clear Filters ×
            </button>
          )}
          <button className="t-btn t-btn-outline t-btn-sm" style={{color:"rgba(255,255,255,.7)",borderColor:"rgba(255,255,255,.3)",background:"transparent"}} onClick={load}>
            ↻ Refresh
          </button>
        </div>
      </div>

      <div className="t-kpis" style={{gridTemplateColumns:"repeat(4,1fr)"}}>
        {[
          {label:"Total in Lineup",     value:totalCount,    color:"#5b21b6"},
          {label:"Interview Scheduled", value:scheduledCount,color:"#0066b3"},
          {label:"Completed",           value:completedCount,color:"#009149"},
          {label:"Joined / Offered",    value:joinedCount,   color:"#e2001a", highlight:true},
        ].map(k=>(
          <div key={k.label} className="t-kpi" style={k.highlight?{background:"#fff5f5"}:{}}>
            <div className="t-kpi-accent" style={{background:k.color}}/>
            <div className="t-kpi-label">{k.label}</div>
            <div className="t-kpi-value" style={k.highlight?{color:k.color}:{}}>{k.value}</div>
          </div>
        ))}
      </div>

      <div className="t-tabs">
        {TIME_TABS.map(t=>(
          <div key={t.id} className={"t-tab"+(timeFil===t.id?" active":"")} onClick={()=>setTimeFil(t.id)}>
            {t.label}
            <span style={{fontSize:9,marginLeft:5,opacity:.55,fontFamily:"var(--fm)"}}>{t.count}</span>
          </div>
        ))}
      </div>

      <div style={{flex:1,background:"var(--white)"}}>
        {loading && <div style={{padding:60,textAlign:"center"}}><Spin/></div>}

        {!loading && rows.length === 0 && (
          <div className="t-empty" style={{lineHeight:2}}>
            No candidates in the interview lineup yet.
            <br/>
            <span style={{fontSize:12,color:"var(--muted)",fontWeight:400}}>
              Candidates appear here automatically when a lead's feedback is set to "Interested – Interview Lined Up".
            </span>
          </div>
        )}

        {!loading && rows.length > 0 && filtered.length === 0 && (
          <div className="t-empty">
            No entries match the current filters.
            <button className="t-btn t-btn-outline t-btn-sm" style={{marginLeft:12}} onClick={clearFilters}>Clear filters</button>
          </div>
        )}

        {!loading && filtered.length > 0 && (
          <div className="t-tbl-wrap" style={{overflowX:"auto"}}>
            <table className="t-tbl" style={{minWidth: shownCols.reduce((s,c)=>s+(COL_WIDTHS[c]||100),0)}}>
              <thead>
                <tr>
                  {shownCols.map(h=>(
                    <th key={h} style={{minWidth:(COL_WIDTHS[h]||100)}}>{h}</th>
                  ))}
                </tr>
                <tr className="filter-row">
                  {shownCols.map(h=>(
                    <td key={h} style={{padding:"2px 3px"}}>
                      {FILTER_COLS.indexOf(h) >= 0 ? (
                        <ExcelColFilter
                          header={h}
                          values={colValues[h]||[]}
                          selected={filters[h]||null}
                          onChange={v=>setColFilter(h,v)}
                        />
                      ) : null}
                    </td>
                  ))}
                </tr>
              </thead>
              <tbody>
                {filtered.map((row,i)=>(
                  <tr key={i}>
                    {shownCols.map(h=>(
                      <td key={h} style={{minWidth:(COL_WIDTHS[h]||100),padding:"4px 6px"}}>
                        {renderCell(h, row[h], row)}
                      </td>
                    ))}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// MANUAL TRACKER — Excel-style inline grid
// ─────────────────────────────────────────────────────────────

const MT_STATUS_OPTS = ["Connected","DNP-1","DNP-2","DNP-3","DNP-4","DNP-5","Not Interested","Call Back","Hiring On Hold","Irrelevant"];
const MT_LINED_OPTS  = ["Yes","No","Pending"];
const MT_SOURCE_OPTS = ["LinkedIn","Hunar Marketplace","Naukri","Shine","FoundIt","Apna","Job Hai","Work India","Reference","Other"];

const MT_COLS_BASE = [
  { key:"date",       label:"Date",          w:110,  type:"date" },
  { key:"name",       label:"Candidate Name",w:150              },
  { key:"phone",      label:"Contact",       w:115,  mono:true  },
  { key:"location",   label:"Location",      w:90               },
  { key:"client",     label:"Client",        w:140              },
  { key:"role",       label:"Role",          w:100              },
  { key:"source",     label:"Source",        w:110,  type:"select", opts:MT_SOURCE_OPTS },
  { key:"callStatus", label:"Call Status",   w:130,  type:"select", opts:MT_STATUS_OPTS },
  { key:"linedUp",    label:"Lined Up",      w:80,   type:"select", opts:MT_LINED_OPTS  },
  { key:"remarks",    label:"Remarks",       w:"auto"           },
];

// "Added By" appears only for TL/IC/super_admin. Read-only — derived from server fields.
const MT_COL_ADDED_BY = { key:"addedBy", label:"Added By", w:120, readOnly:true };
function _mtEmpty() {
  return {
    _id:    Math.random().toString(36).slice(2),
    uid:    "",
    date:   new Date().toISOString().slice(0,10),
    name:"", phone:"", location:"", client:"", role:"", source:"",
    callStatus:"", linedUp:"", remarks:"",
    addedBy:"", addedByEmail:"", team:"",
    _saved:false, _dirty:false,
  };
}
function _mtFromServer(r) {
  let ds="";
  try { if(r["Date"]) ds=new Date(r["Date"]).toISOString().slice(0,10); } catch(_){}
  const addedByName  = String(r["Added By Name"]  || "").trim();
  const addedByEmail = String(r["Added By Email"] || "").trim();
  const team         = String(r["Team"]           || "").trim();
  return {
    _id:        r["Unique ID"]||Math.random().toString(36).slice(2),
    uid:        r["Unique ID"]||"",
    date:       ds,
    name:       String(r["Candidate Name"]||""),
    phone:      String(r["Contact Number"] ||""),
    location:   String(r["Location"]       ||""),
    client:     String(r["Client"]         ||""),
    role:       String(r["Role"]           ||""),
    source:     String(r["Source"]         ||""),
    callStatus: String(r["Call Status"]    ||""),
    linedUp:    String(r["Lined-up"]       ||""),
    remarks:    String(r["Remarks"]        ||""),
    addedBy:    addedByName || addedByEmail || "—",
    addedByEmail,
    team,
    _saved:true, _dirty:false,
  };
}

// ─────────────────────────────────────────────────────────────
// TEAM LIST DROPDOWN — per-team client/role with inline "+ Add" for TL/IC/super_admin
// ─────────────────────────────────────────────────────────────
function TeamListDropdown({ type, value, options, disabled, canAdd, onChange, onRequestAdd }) {
  const opts = options || [];
  const known = opts.some(o => String(o.value).toLowerCase() === String(value||"").toLowerCase());
  return (
    <div style={{display:"flex",alignItems:"center",height:"100%",width:"100%"}}>
      <select
        value={known ? value : (value ? "__custom__" : "")}
        disabled={disabled}
        onChange={e=>{
          const v = e.target.value;
          if (v === "__add__") { if (onRequestAdd) onRequestAdd(); return; }
          if (v === "__custom__") return;
          onChange(v);
        }}
        style={{
          flex:1,minWidth:0,height:30,border:"none",background:"transparent",
          fontSize:11,fontFamily:"var(--fb)",color:value?"var(--black)":"#bbb",
          padding:"2px 6px",outline:"none",cursor:"pointer",
          opacity: disabled ? 0.5 : 1,
        }}
      >
        <option value="">—</option>
        {opts.map(o => (
          <option key={o.value} value={o.value}>{o.value}</option>
        ))}
        {!known && value ? <option value="__custom__">{value} (custom)</option> : null}
        {canAdd ? <option value="__add__">+ Add new {type}…</option> : null}
      </select>
    </div>
  );
}

function AddTeamListModal({ type, onClose, onAdded }) {
  const [value, setValue] = useState("");
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const [list, setList] = useState([]);
  const [listLoading, setListLoading] = useState(true);

  async function loadList() {
    setListLoading(true);
    const r = await api("getTeamLists", {});
    setListLoading(false);
    if (r.ok) setList(type === "client" ? (r.clients || []) : (r.roles || []));
  }
  useEffect(()=>{ loadList(); },[]);

  async function submit() {
    const v = value.trim();
    if (!v) { setErr("Cannot be empty."); return; }
    setBusy(true); setErr("");
    const r = await api("addTeamListValue", { type, value: v });
    setBusy(false);
    if (!r.ok) { setErr(r.message || r.error || "Failed."); return; }
    setValue("");
    await loadList();
    if (onAdded) onAdded(v);
  }

  const title = type === "client" ? "Manage Clients" : "Manage Roles";
  const placeholder = type === "client" ? "e.g. Muthoot Fincorp" : "e.g. Gold Loan Manager";

  return (
    <div className="t-modal-bg" onClick={e=>{ if(e.target===e.currentTarget) onClose(); }}>
      <div className="t-modal t-fade" style={{maxWidth:480}}>
        <div className="t-modal-hd">
          <span style={{textTransform:"none",letterSpacing:0,fontSize:14}}>{title}</span>
          <button onClick={onClose} style={{background:"none",border:"none",color:"rgba(255,255,255,.6)",cursor:"pointer",fontSize:20,lineHeight:1}}>×</button>
        </div>
        <div className="t-modal-body" style={{padding:"16px 18px"}}>
          <div style={{fontSize:11,color:"var(--muted)",marginBottom:10,lineHeight:1.5}}>
            Values added here are visible to your whole team. <b>You can add but cannot remove</b> — contact a super admin if needed.
          </div>
          <div style={{display:"flex",gap:6,marginBottom:14}}>
            <input
              autoFocus
              value={value}
              onChange={e=>setValue(e.target.value)}
              onKeyDown={e=>{ if(e.key==="Enter") submit(); }}
              placeholder={placeholder}
              maxLength={80}
              style={{flex:1,padding:"8px 10px",border:"1.5px solid var(--border)",borderRadius:2,fontSize:13,fontFamily:"var(--fb)",outline:"none"}}
            />
            <button
              className="t-btn t-btn-black"
              disabled={busy || !value.trim()}
              onClick={submit}
              style={{minWidth:80}}
            >{busy ? <Spin/> : "Add"}</button>
          </div>
          {err && <div className="t-alert t-alert-err" style={{marginBottom:10,fontSize:11}}>{err}</div>}

          <div style={{fontFamily:"var(--fd)",fontWeight:700,fontSize:9,letterSpacing:".16em",textTransform:"uppercase",color:"var(--muted)",marginBottom:6}}>
            Existing — {list.length}
          </div>
          <div style={{maxHeight:280,overflowY:"auto",border:"1px solid var(--border)",borderRadius:2}}>
            {listLoading && <div style={{padding:20,textAlign:"center"}}><Spin/></div>}
            {!listLoading && list.length === 0 && (
              <div style={{padding:18,fontSize:11,color:"var(--muted)",fontStyle:"italic",textAlign:"center"}}>None yet. Add the first one above.</div>
            )}
            {!listLoading && list.map((row,i)=>(
              <div key={row.value+i} style={{padding:"8px 12px",borderBottom:i<list.length-1?"1px solid #f0f0f0":"none",display:"flex",alignItems:"center",gap:8,fontSize:12}}>
                <span style={{flex:1,fontWeight:500}}>{row.value}</span>
                <span style={{fontSize:9,fontFamily:"var(--fm)",color:"var(--muted)"}}>by {row.addedBy || "—"}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

function ManualTrackerView({ user }) {
  const [saved,   setSaved]   = useState([]);
  const [empties, setEmpties] = useState(()=>Array.from({length:5},_mtEmpty));
  const [loading, setLoading] = useState(true);
  const [timeFil, setTimeFil] = useState("7d");
  const [saveState, setSaveState] = useState({});
  const flushingRef = useRef(new Set());
  const debounceRef = useRef({});         // { rowId: timeoutId }
  const [teamLists, setTeamLists] = useState({ clients: [], roles: [] });
  const [showAddModal, setShowAddModal] = useState(null); // "client" | "role" | null

  // Show "Added By" for anyone managing other people's entries
  const showAddedBy = user.role === "team_lead" || user.role === "individual_contributor" || user.role === "super_admin";
  const MT_COLS = useMemo(
    () => showAddedBy ? [...MT_COLS_BASE, MT_COL_ADDED_BY] : MT_COLS_BASE,
    [showAddedBy]
  );

  async function load() {
    setLoading(true);
    const r = await api("getManualTracker",{});
    setLoading(false);
    if (r.ok) setSaved((r.rows||[]).map(_mtFromServer));
  }
  async function loadTeamLists() {
    const r = await api("getTeamLists", {});
    if (r.ok) setTeamLists({ clients: r.clients || [], roles: r.roles || [] });
  }
  useEffect(()=>{ load(); loadTeamLists(); },[]);

  // Debounced schedule for empty (unsaved) rows only
  function scheduleSave(rowId, isSavedRow) {
    if (isSavedRow) return; // saved rows use per-cell debounce in patchSaved
    if (debounceRef.current[rowId]) clearTimeout(debounceRef.current[rowId]);
    debounceRef.current[rowId] = setTimeout(() => {
      delete debounceRef.current[rowId];
      flushEmpty(rowId);
    }, 1200);
  }
  function saveNow(rowId, isSavedRow) {
    if (isSavedRow) return;
    if (debounceRef.current[rowId]) { clearTimeout(debounceRef.current[rowId]); delete debounceRef.current[rowId]; }
    flushEmpty(rowId);
  }
  // On unmount, flush any pending
  useEffect(()=>()=>{ Object.keys(debounceRef.current).forEach(id => clearTimeout(debounceRef.current[id])); },[]);
  useEffect(()=>{
    const t = setInterval(load, 5 * 60 * 1000);
    return ()=>clearInterval(t);
  },[]);

  // Per-cell save state: { "uid|fieldName": "saving"|"ok" }
  const [cellSaveState, setCellSaveState] = useState({});
  function _setCellSS(uid, field, state) {
    const k = uid + "|" + field;
    setCellSaveState(p=>({...p,[k]:state}));
    if (state==="ok") setTimeout(()=>setCellSaveState(p=>{const n={...p};delete n[k];return n;}),1500);
  }

  function patchSaved(uid, key, val) {
    setSaved(prev=>prev.map(r=>r.uid===uid?{...r,[key]:val}:r));
    // schedule per-cell debounce
    const debKey = uid + "|" + key;
    if (debounceRef.current[debKey]) clearTimeout(debounceRef.current[debKey]);
    debounceRef.current[debKey] = setTimeout(async () => {
      delete debounceRef.current[debKey];
      _setCellSS(uid, key, "saving");
      try {
        await api("updateManualEntry", { uniqueId: uid, fields: { [key]: val } });
        _setCellSS(uid, key, "ok");
      } catch { _setCellSS(uid, key, null); }
    }, 600);
  }
  function patchEmpty(id, key, val) {
    setEmpties(prev=>prev.map(r=>r._id===id?{...r,[key]:val}:r));
    // save on blur/Tab/Enter only
  }

  function _setSS(sid, state) {
    setSaveState(p=>({...p,[sid]:state}));
    if (state==="ok") setTimeout(()=>setSaveState(p=>{const n={...p};delete n[sid];return n;}),1500);
  }

  async function flushEmpty(id) {
    if (flushingRef.current.has(id)) return; // prevent re-entrancy / race
    const row = empties.find(r=>r._id===id);
    // Only save when the row is meaningfully complete:
    // name + phone (required) + callStatus (signals the row is done)
    if (!row) return;
    if (!row.name.trim() || !row.phone.trim()) return;
    if (!row.callStatus || !String(row.callStatus).trim()) return;
    flushingRef.current.add(id);
    _setSS(id,"saving");
    try {
      const res = await api("addManualEntry",{entry:{
        date:row.date, candidateName:row.name, contactNumber:row.phone,
        client:row.client, role:row.role, source:row.source, location:row.location||"",
      }});
      if (!res.ok) { _setSS(id,null); return; }

      // After save, fetch latest empty-row state — user may have typed more while we awaited
      const latest = empties.find(r=>r._id===id) || row;
      const followUpFields = {};
      if (latest.callStatus !== row.callStatus || row.callStatus) followUpFields["Call Status"] = latest.callStatus;
      if (latest.linedUp    !== row.linedUp    || row.linedUp)    followUpFields["Lined-up"]    = latest.linedUp;
      if (latest.remarks    !== row.remarks    || row.remarks)    followUpFields["Remarks"]     = latest.remarks;
      // Also include client/role/source/date/name/phone/location if they changed during the in-flight save
      if (latest.client   !== row.client)   followUpFields["Client"]         = latest.client;
      if (latest.role     !== row.role)     followUpFields["Role"]           = latest.role;
      if (latest.source   !== row.source)   followUpFields["Source"]         = latest.source;
      if (latest.location !== row.location) followUpFields["Location"]       = latest.location;
      if (latest.date     !== row.date)     followUpFields["Date"]           = latest.date;
      if (latest.name     !== row.name)     followUpFields["Candidate Name"] = latest.name;
      if (latest.phone    !== row.phone)    followUpFields["Contact Number"] = latest.phone;

      if (Object.keys(followUpFields).length > 0) {
        await api("updateManualEntry",{uniqueId:res.uniqueId,fields:followUpFields});
      }

      setSaved(prev=>[...prev,{...latest,uid:res.uniqueId,_id:res.uniqueId,_saved:true,_dirty:false}]);
      setEmpties(prev=>prev.filter(r=>r._id!==id));
      _setSS(id,"ok");
    } catch(e) {
      _setSS(id,null);
    } finally {
      flushingRef.current.delete(id);
    }
  }

  function addMoreRows(n=10) {
    setEmpties(prev=>[...prev,...Array.from({length:n},_mtEmpty)]);
  }

  function onKeyDown(e, localId, isSavedRow) {
    if (e.key!=="Enter") return;
    e.preventDefault();
    const allRows = document.querySelectorAll("tr[data-mtrow]");
    const cur = e.target.closest("tr");
    const arr = Array.from(allRows);
    const idx = arr.indexOf(cur);
    if (idx>=0 && idx<arr.length-1) {
      const next = arr[idx+1].querySelector("input,select");
      if (next) next.focus();
    }
  }

  // Count rows per tab for badges
  function countFor(days) {
    const cutoff = new Date();
    if (days===0) cutoff.setHours(0,0,0,0);
    else { cutoff.setDate(cutoff.getDate()-days); cutoff.setHours(0,0,0,0); }
    return saved.filter(r=>{ try{return new Date(r.date)>=cutoff;}catch{return false;} }).length;
  }

  const filteredSaved = useMemo(()=>{
    if (timeFil==="all") return saved;
    const cutoff = new Date();
    if (timeFil==="today") cutoff.setHours(0,0,0,0);
    else { cutoff.setDate(cutoff.getDate()-(timeFil==="7d"?7:30)); cutoff.setHours(0,0,0,0); }
    return saved.filter(r=>{ try{return new Date(r.date)>=cutoff;}catch{return false;} });
  },[saved,timeFil]);

  const displayRows = [...filteredSaved,...empties];
  const totalSaved  = saved.length;
  const connCount   = saved.filter(r=>String(r.callStatus).toLowerCase().includes("connected")).length;
  const lineupCount = saved.filter(r=>String(r.linedUp).toLowerCase()==="yes").length;

  const thSt = {
    padding:"6px 8px", fontSize:9, fontWeight:700, fontFamily:"var(--fd)",
    letterSpacing:".18em", textTransform:"uppercase", color:"var(--muted)",
    borderBottom:"2px solid var(--black)", background:"var(--white)",
    textAlign:"left", whiteSpace:"nowrap", position:"sticky", top:0, zIndex:2,
  };
  const cellInp = {
    width:"100%", height:30, border:"none", background:"transparent",
    fontSize:12, fontFamily:"var(--fb)", color:"var(--black)",
    padding:"4px 8px", outline:"none", display:"block",
  };
  const cellSel = {
    width:"100%", height:30, border:"none", background:"transparent",
    fontSize:11, fontFamily:"var(--fb)", color:"var(--black)",
    padding:"2px 6px", outline:"none", cursor:"pointer",
  };

  const TIME_TABS = [
    {id:"today",label:"Today",     count:countFor(0)  },
    {id:"7d",   label:"Last 7 days",count:countFor(7) },
    {id:"30d",  label:"Last 30 days",count:countFor(30)},
    {id:"all",  label:"All time",  count:totalSaved   },
  ];

  if (loading) return (
    <div className="t-fade">
      <div className="t-mast"><div><div className="t-mast-title">Manual Tracker</div><div className="t-mast-sub">Loading…</div></div></div>
      <div style={{padding:60,textAlign:"center"}}><Spin/></div>
    </div>
  );

  return (
    <div className="t-fade" style={{display:"flex",flexDirection:"column",minHeight:"calc(100vh - 48px)"}}>
      <div className="t-mast">
        <div>
          <div className="t-mast-title">Manual Tracker</div>
          <div className="t-mast-sub">{totalSaved} entries · {connCount} connected · {lineupCount} lined up</div>
        </div>
      </div>

      {/* KPI strip */}
      <div className="t-kpis" style={{gridTemplateColumns:"repeat(3,1fr)"}}>
        {[
          {label:"Total Entries",value:totalSaved,  color:"#0066b3"},
          {label:"Connected",    value:connCount,   color:"#009149"},
          {label:"Lined Up",     value:lineupCount, color:"#5b21b6"},
        ].map(k=>(
          <div key={k.label} className="t-kpi">
            <div className="t-kpi-accent" style={{background:k.color}}/>
            <div className="t-kpi-label">{k.label}</div>
            <div className="t-kpi-value">{k.value}</div>
          </div>
        ))}
      </div>

      {/* Time tabs */}
      <div className="t-tabs">
        {TIME_TABS.map(t=>(
          <div key={t.id} className={"t-tab"+(timeFil===t.id?" active":"")} onClick={()=>setTimeFil(t.id)}>
            {t.label}
            <span style={{fontSize:9,marginLeft:5,opacity:.55,fontFamily:"var(--fm)"}}>{t.count}</span>
          </div>
        ))}
      </div>

      {/* Excel grid */}
      <div style={{flex:1,background:"var(--white)",overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",tableLayout:"fixed",minWidth:940}}>
          <colgroup>
            <col style={{width:32}}/>
            {MT_COLS.map(c=><col key={c.key} style={{width:typeof c.w==="number"?c.w+"px":"auto"}}/>)}
            <col style={{width:34}}/>
          </colgroup>
          <thead>
            <tr>
              <th style={{...thSt,width:32,textAlign:"center"}}>#</th>
              {MT_COLS.map(c=><th key={c.key} style={thSt}>{c.label}</th>)}
              <th style={thSt}></th>
            </tr>
          </thead>
          <tbody>
            {displayRows.map((row,idx)=>{
              const isSaved = !!row.uid;
              const sid = row.uid||row._id;
              const ss  = saveState[sid];  // for empty rows
              const hasData = !isSaved&&(row.name||row.phone);
              // For saved rows: check if any cell is saving/ok
              const cellsForRow = isSaved ? Object.entries(cellSaveState).filter(([k])=>k.startsWith(row.uid+"|")) : [];
              const anyCellSaving = cellsForRow.some(([,v])=>v==="saving");
              const anyCellOk = cellsForRow.some(([,v])=>v==="ok") && !anyCellSaving;
              const rowBg = hasData?"#f0f7ff":"transparent";
              const onChange = (key,val)=>{ if(isSaved)patchSaved(row.uid,key,val); else patchEmpty(row._id,key,val); };

              return (
                <tr key={sid} data-mtrow="1" style={{background:rowBg}}>
                  <td style={{textAlign:"center",fontSize:9,fontFamily:"var(--fm)",color:"var(--muted)",padding:"2px 0",borderBottom:"1px solid #eee",borderRight:"1px solid #f0f0f0",background:"#fafafa"}}>
                    {idx+1}
                  </td>
                  {MT_COLS.map(col=>{
                    const val = row[col.key]||"";
                    const cellKey = isSaved ? (row.uid + "|" + col.key) : null;
                    const cellSt = cellKey ? cellSaveState[cellKey] : null;
                    const isCellSaving = cellSt === "saving";
                    if (col.readOnly) {
                      return (
                        <td key={col.key} style={{padding:"4px 8px",borderBottom:"1px solid #eee",borderRight:"1px solid #f5f5f5",height:30,fontSize:11,color:isSaved?"var(--black)":"#bbb",fontFamily:"var(--fb)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={row.addedByEmail||""}>
                          {isSaved ? (val || "—") : <span style={{color:"#bbb",fontStyle:"italic"}}>auto</span>}
                        </td>
                      );
                    }
                    return (
                      <td key={col.key} style={{padding:0,borderBottom:"1px solid #eee",borderRight:"1px solid #f5f5f5",height:30,position:"relative"}}>
                        {col.key === "client" || col.key === "role" ? (
                          <TeamListDropdown
                            type={col.key}
                            value={val}
                            options={col.key === "client" ? teamLists.clients : teamLists.roles}
                            disabled={isCellSaving}
                            canAdd={user.role==="team_lead"||user.role==="individual_contributor"||user.role==="super_admin"}
                            onChange={v=>onChange(col.key, v)}
                            onRequestAdd={()=>setShowAddModal(col.key)}
                          />
                        ) : col.type==="select"?(
                          <select
                            value={val}
                            onChange={e=>onChange(col.key,e.target.value)}
                            onBlur={()=>!isSaved&&saveNow(sid, false)}
                            style={{...cellSel, opacity: isCellSaving ? 0.6 : 1}}
                          >
                            <option value="">—</option>
                            {col.opts.map(o=><option key={o} value={o}>{o}</option>)}
                          </select>
                        ):(
                          <input
                            type={col.type==="date"?"date":"text"}
                            value={val}
                            placeholder={!isSaved?col.label:""}
                            onChange={e=>onChange(col.key,e.target.value)}
                            onBlur={()=>{ if(!isSaved) saveNow(sid, false); }}
                            onKeyDown={e=>{
                              if (e.key==="Enter" || e.key==="Tab") {
                                if (!isSaved) saveNow(sid, false);
                              }
                              onKeyDown(e,sid,isSaved);
                            }}
                            style={{
                              ...cellInp,
                              fontFamily:col.mono?"var(--fm)":"var(--fb)",
                              color:(!val&&!isSaved)?"#bbb":"var(--black)",
                              opacity: isCellSaving ? 0.6 : 1,
                            }}
                          />
                        )}
                        {isCellSaving && <span style={{position:"absolute",right:3,top:"50%",transform:"translateY(-50%)",fontSize:9,color:"var(--blue)",fontFamily:"var(--fm)",pointerEvents:"none"}}>…</span>}
                        {cellSt==="ok" && <span style={{position:"absolute",right:3,top:"50%",transform:"translateY(-50%)",fontSize:11,color:"var(--green)",pointerEvents:"none"}}>✓</span>}
                      </td>
                    );
                  })}
                  <td style={{textAlign:"center",borderBottom:"1px solid #eee",padding:"4px 2px"}}>
                    {!isSaved && ss==="saving" && <Spin/>}
                    {!isSaved && ss==="ok"     && <span style={{color:"var(--green)",fontSize:14,lineHeight:1}}>✓</span>}
                    {isSaved && anyCellSaving   && <Spin/>}
                    {isSaved && anyCellOk       && <span style={{color:"var(--green)",fontSize:14,lineHeight:1}}>✓</span>}
                    {!isSaved&&!ss&&(row.name||row.phone)&&!(row.callStatus&&row.callStatus.trim()) && <span title="Fill Call Status to save" style={{color:"#94a3b8",fontSize:11,cursor:"default"}}>⏸</span>}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>

        <div
          onClick={()=>addMoreRows(10)}
          style={{padding:"7px 12px 7px 40px",fontSize:10,fontFamily:"var(--fd)",fontWeight:700,letterSpacing:".12em",textTransform:"uppercase",color:"var(--muted)",cursor:"pointer",borderTop:"1px solid #eee",background:"#fafafa",userSelect:"none"}}
          onMouseEnter={e=>e.currentTarget.style.color="var(--black)"}
          onMouseLeave={e=>e.currentTarget.style.color="var(--muted)"}
        >
          + Add 10 more rows
        </div>

        <div style={{padding:"5px 12px",fontSize:10,fontFamily:"var(--fm)",color:"var(--muted)",background:"#fafafa",borderTop:"1px solid #eee",display:"flex",gap:16,flexWrap:"wrap"}}>
          <span>Tab — next cell</span>
          <span>Enter — next row</span>
          <span>New rows save when Call Status is set · Each cell saves independently on blur</span>
          {(Object.values(saveState).some(s=>s==="saving") || Object.values(cellSaveState).some(s=>s==="saving")) && <span style={{color:"var(--blue)"}}>Saving…</span>}
        </div>
      </div>

      {showAddModal && (
        <AddTeamListModal
          type={showAddModal}
          onClose={()=>setShowAddModal(null)}
          onAdded={async (newValue)=>{
            await loadTeamLists();
            setShowAddModal(null);
          }}
        />
      )}
    </div>
  );
}

// ─── Force Poll Button (super admin only) ────────────────────────────────────
function ForcePollButton() {
  const [status, setStatus] = useState("idle"); // idle | polling | done | error
  const [msg, setMsg]       = useState("");

  async function trigger() {
    setStatus("polling"); setMsg("");
    try {
      const resp = await fetch(API_URL.replace(/\/+$/, "") + "/api/forcepoll", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ session: localStorage.getItem("session") }),
      });
      const data = await resp.json();
      if (data.ok) { setStatus("done"); setMsg(data.note || "Poll triggered!"); }
      else { setStatus("error"); setMsg(data.message || data.error || "Failed"); }
    } catch(e) { setStatus("error"); setMsg(e.message); }
    setTimeout(() => setStatus("idle"), 6000);
  }

  const colors = { idle:"#6739b7", polling:"#888", done:"#009149", error:"#cc2222" };
  const labels = { idle:"⚡ Force Poll", polling:"Polling…", done:"✓ Triggered", error:"✗ Failed" };

  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:3}}>
      <button
        onClick={trigger}
        disabled={status==="polling"}
        style={{padding:"7px 16px",fontSize:11,fontFamily:"var(--fd)",fontWeight:700,
          letterSpacing:".1em",textTransform:"uppercase",cursor:status==="polling"?"not-allowed":"pointer",
          border:"1px solid rgba(255,255,255,.25)",borderRadius:3,
          background:colors[status],color:"#fff",transition:"background .2s"}}
      >{labels[status]}</button>
      {msg && <span style={{fontSize:10,color:"rgba(255,255,255,.6)",fontFamily:"var(--fm)",maxWidth:200,textAlign:"right"}}>{msg}</span>}
    </div>
  );
}

function AgentIntelView({ user, agents }) {
  const [users, setUsers]                 = useState([]);
  const [campaigns, setCampaigns]         = useState([]);
  const [loading, setLoading]             = useState(true);
  const [expandedTeams, setExpandedTeams] = useState({});
  const [expandedICs, setExpandedICs]     = useState({});

  useEffect(() => {
    setLoading(true);
    Promise.all([
      api("listUsers", {}),
      api("getCampaigns", {}),
    ]).then(([ur, cr]) => {
      if (ur.ok) setUsers(ur.users || []);
      if (cr.ok) setCampaigns(cr.campaigns || []);
      setLoading(false);
    });
  }, []);

  // agents indexed by agentCode for quick lookup
  const agentByCode = useMemo(() => {
    const m = {};
    agents.forEach(a => { m[a.agentCode] = a; });
    return m;
  }, [agents]);

  // Per-IC per-agent stats: key = agentCode + "||" + triggeredBy
  const agentStats = useMemo(() => {
    const map = {};
    campaigns.forEach(c => {
      const key = (c.agentCode || "") + "||" + (c.triggeredBy || "").toLowerCase();
      if (!map[key]) map[key] = { campaigns:0, calls:0, minutes:0, qualified:0, connected:0 };
      map[key].campaigns += 1;
      map[key].calls     += Number(c.contactsCount || 0);
      map[key].minutes   += Number(c.actualMinutes || 0);
      map[key].qualified += Number(c.qualified     || 0);
      map[key].connected += Number(c.connected     || 0);
    });
    return map;
  }, [campaigns]);

  function statsFor(agentCode, email) {
    return agentStats[(agentCode || "") + "||" + (email || "").toLowerCase()] || {};
  }

  // Which agentCodes has each user actually triggered campaigns on?
  const usedAgentsByEmail = useMemo(() => {
    const m = {};
    campaigns.forEach(c => {
      const email = (c.triggeredBy || "").toLowerCase();
      if (!email || !c.agentCode) return;
      if (!m[email]) m[email] = new Set();
      m[email].add(c.agentCode);
    });
    return m;
  }, [campaigns]);

  // Team → [TL / IC users]
  const teamGroups = useMemo(() => {
    const g = {};
    users
      .filter(u => u.role === "team_lead" || u.role === "individual_contributor")
      .forEach(u => {
        const team = u.team || "__noteam__";
        if (!g[team]) g[team] = [];
        g[team].push(u);
      });
    return g;
  }, [users]);

  // Get agents an IC has actually used, with full agent details
  function agentsUsedBy(email) {
    const codes = usedAgentsByEmail[email.toLowerCase()] || new Set();
    return [...codes].map(code => agentByCode[code]).filter(Boolean);
  }
  // All agents owned (createdBy) by an IC — show even with zero usage
  function agentsOwnedBy(email) {
    const lower = (email || "").toLowerCase();
    return agents.filter(a => String(a.createdBy || "").toLowerCase() === lower);
  }
  // Union of owned + used (used handles cross-team shared usage)
  function agentsAccessibleBy(email) {
    const seen = new Set();
    const out = [];
    agentsOwnedBy(email).forEach(a => { if (!seen.has(a.agentCode)) { seen.add(a.agentCode); out.push(a); } });
    agentsUsedBy(email).forEach(a => { if (!seen.has(a.agentCode)) { seen.add(a.agentCode); out.push(a); } });
    return out;
  }

  // Sum stats across all agents this IC has used
  function icTotals(email) {
    return agentsUsedBy(email).reduce((acc, a) => {
      const s = statsFor(a.agentCode, email);
      acc.campaigns += s.campaigns || 0;
      acc.calls     += s.calls     || 0;
      acc.minutes   += s.minutes   || 0;
      acc.qualified += s.qualified || 0;
      return acc;
    }, { campaigns:0, calls:0, minutes:0, qualified:0 });
  }

  const teams = Object.keys(teamGroups).sort();

  // Agents that nobody in the team groups has used → show under "Other"
  const allUsedAgentCodes = new Set(
    Object.values(usedAgentsByEmail).flatMap(s => [...s])
  );
  const unusedAgents = agents.filter(a => !allUsedAgentCodes.has(a.agentCode));

  // Global KPIs
  const totalCampaigns = campaigns.length;
  const totalCalls     = campaigns.reduce((s,c) => s + Number(c.contactsCount||0), 0);
  const totalQualified = campaigns.reduce((s,c) => s + Number(c.qualified||0), 0);

  if (loading) return <div style={{padding:80,textAlign:"center"}}><Spin/></div>;

  const AgentRow = ({ a, icEmail, showCreatedBy }) => {
    const s    = statsFor(a.agentCode, icEmail);
    const conv = s.calls > 0 ? Math.round((s.qualified||0) / s.calls * 100) : 0;
    return (
      <tr>
        <td>
          <div className="nm">{a.displayName || a.agentCode}</div>
          <div className="nm-sub" style={{fontFamily:"var(--fm)",fontSize:9,color:"#999",marginTop:1}}>
            {a.agentCode}
          </div>
        </td>
        <td>
          <span className="t-mono" style={{fontSize:10,color:"var(--muted)",wordBreak:"break-all",
            maxWidth:180,display:"block"}}>
            {a.agentId || "—"}
          </span>
        </td>
        {showCreatedBy && (
          <td><span className="t-mono" style={{fontSize:11,color:"var(--muted)"}}>{a.createdBy || "system"}</span></td>
        )}
        <td>
          {a.addedById
            ? <span className="t-tag t-tag-purple">LINKED</span>
            : <span className="t-tag t-tag-blue">CREATED</span>}
        </td>
        <td>
          {a.active
            ? <span className="t-tag t-tag-green">ACTIVE</span>
            : <span className="t-tag t-tag-gray">INACTIVE</span>}
        </td>
        <td><span className="t-mono">{s.campaigns || 0}</span></td>
        <td><span className="t-mono">{(s.calls || 0).toLocaleString()}</span></td>
        <td><span className="t-mono">{Math.round(s.minutes || 0)}m</span></td>
        <td>
          <span className="t-mono" style={{color:(s.qualified||0)>0?"var(--green)":"var(--muted)"}}>
            {s.qualified || 0}
          </span>
        </td>
        <td>
          {s.calls > 0
            ? <span style={{fontFamily:"var(--fd)",fontWeight:900,fontSize:12,
                color:conv>10?"var(--green)":conv>5?"var(--black)":"var(--red)"}}>
                {conv}%
              </span>
            : <span style={{color:"#ccc"}}>—</span>}
        </td>
      </tr>
    );
  };

  const AgentTable = ({ agentList, icEmail, showCreatedBy }) => (
    <div className="t-tbl-wrap">
      <table className="t-tbl">
        <thead>
          <tr>
            <th>Agent</th>
            <th>Agent ID</th>
            {showCreatedBy && <th>Created By</th>}
            <th>Type</th>
            <th>Status</th>
            <th>Campaigns</th>
            <th>Calls</th>
            <th>Minutes</th>
            <th>Qualified</th>
            <th>Conv %</th>
          </tr>
        </thead>
        <tbody>
          {agentList.map(a => (
            <AgentRow key={a.agentCode} a={a} icEmail={icEmail} showCreatedBy={showCreatedBy}/>
          ))}
        </tbody>
      </table>
    </div>
  );

  return (
    <div className="t-fade">
      <div className="t-mast">
        <div>
          <div className="t-mast-title">Agent Intel</div>
          <div className="t-mast-sub">Which agents each member actually used · metrics scoped per member</div>
        </div>
        <div className="t-mast-r">
          <div style={{display:"flex",gap:6,alignItems:"center",fontSize:11,fontFamily:"var(--fm)",
            color:"rgba(255,255,255,.5)"}}>
            <span>{agents.length} agents</span>
            <span>·</span>
            <span>{users.filter(u=>u.role==="team_lead"||u.role==="individual_contributor").length} ICs/TLs</span>
          </div>
          <ForcePollButton />
        </div>
      </div>

      {/* Global KPI strip */}
      <div className="t-kpis" style={{gridTemplateColumns:"repeat(5,1fr)"}}>
        {[
          { label:"Total Agents",    val: agents.length,                     color:"var(--blue)"  },
          { label:"Active Agents",   val: agents.filter(a=>a.active).length, color:"var(--green)" },
          { label:"Campaigns Run",   val: totalCampaigns.toLocaleString(),   color:"var(--black)" },
          { label:"Total Calls",     val: totalCalls.toLocaleString(),       color:"var(--black)" },
          { label:"Total Qualified", val: totalQualified.toLocaleString(),   color:"var(--red)"   },
        ].map(k => (
          <div key={k.label} className="t-kpi">
            <div className="t-kpi-accent" style={{background:k.color}}/>
            <div className="t-kpi-label">{k.label}</div>
            <div className="t-kpi-value" style={{fontSize:24}}>{k.val}</div>
          </div>
        ))}
      </div>

      {/* Team accordion */}
      <div style={{padding:"16px 20px",display:"flex",flexDirection:"column",gap:12}}>
        {teams.map(team => {
          const ics      = teamGroups[team];
          const teamName = team === "__noteam__" ? "No Team Assigned" : team;
          const isOpen   = expandedTeams[team] !== false;

          // Team totals = sum of each IC's actual usage
          const teamTotal = ics.reduce((acc, u) => {
            const t = icTotals(u.email);
            acc.campaigns += t.campaigns;
            acc.calls     += t.calls;
            acc.minutes   += t.minutes;
            acc.qualified += t.qualified;
            acc.agents    += (usedAgentsByEmail[u.email.toLowerCase()] || new Set()).size;
            return acc;
          }, { campaigns:0, calls:0, minutes:0, qualified:0, agents:0 });

          return (
            <div key={team} style={{border:"2px solid var(--black)",borderRadius:2,overflow:"hidden"}}>
              <div
                onClick={()=>setExpandedTeams(p=>({...p,[team]:!isOpen}))}
                style={{background:"var(--black)",color:"#fff",padding:"12px 18px",cursor:"pointer",
                  display:"flex",alignItems:"center",gap:14,userSelect:"none"}}
              >
                <span style={{fontFamily:"var(--fd)",fontWeight:900,fontSize:14,letterSpacing:".06em",
                  textTransform:"uppercase",flex:1}}>{teamName}</span>
                <div style={{display:"flex",gap:10,fontSize:10,fontFamily:"var(--fm)",
                  color:"rgba(255,255,255,.55)"}}>
                  <span>{ics.length} member{ics.length!==1?"s":""}</span>
                  <span>·</span>
                  <span>{teamTotal.agents} agent{teamTotal.agents!==1?"s":""} used</span>
                  <span>·</span>
                  <span>{teamTotal.campaigns} campaigns</span>
                  <span>·</span>
                  <span>{teamTotal.calls.toLocaleString()} calls</span>
                  <span>·</span>
                  <span style={{color:"#6ee7b7"}}>{teamTotal.qualified} qualified</span>
                </div>
                <span style={{color:"rgba(255,255,255,.4)",fontSize:16,marginLeft:8}}>
                  {isOpen ? "▾" : "▸"}
                </span>
              </div>

              {isOpen && ics.map(u => {
                const myAgents = agentsAccessibleBy(u.email);
                const icOpen   = expandedICs[u.email] !== false;
                const totals   = icTotals(u.email);

                return (
                  <div key={u.email} style={{borderTop:"1px solid var(--border)"}}>
                    <div
                      onClick={()=>setExpandedICs(p=>({...p,[u.email]:!icOpen}))}
                      style={{padding:"10px 18px",display:"flex",alignItems:"center",gap:12,
                        cursor:"pointer",background:"#f5f5f5",userSelect:"none"}}
                    >
                      <Disc name={u.name||u.email}/>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontFamily:"var(--fd)",fontWeight:900,fontSize:13}}>
                          {u.name || u.email}
                        </div>
                        <div style={{fontFamily:"var(--fm)",fontSize:10,color:"var(--muted)",
                          marginTop:1,display:"flex",gap:8,alignItems:"center"}}>
                          <span>{u.email}</span>
                          <RoleTag role={u.role}/>
                        </div>
                      </div>
                      <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
                        <span className="t-tag t-tag-blue" style={{fontFamily:"var(--fm)",fontSize:9}}>
                          {myAgents.length} agent{myAgents.length!==1?"s":""}
                        </span>
                        <span style={{fontFamily:"var(--fm)",fontSize:9,padding:"2px 7px",
                          background:"#e8f0fe",color:"#1e40af",borderRadius:3,fontWeight:700}}>
                          {totals.campaigns} camp.
                        </span>
                        <span style={{fontFamily:"var(--fm)",fontSize:9,padding:"2px 7px",
                          background:"#fef9c3",color:"#854d0e",borderRadius:3,fontWeight:700}}>
                          {totals.calls.toLocaleString()} calls
                        </span>
                        <span style={{fontFamily:"var(--fm)",fontSize:9,padding:"2px 7px",
                          background:"#d1fae5",color:"#065f46",borderRadius:3,fontWeight:700}}>
                          {totals.qualified} QL
                        </span>
                        <span style={{fontFamily:"var(--fm)",fontSize:9,padding:"2px 7px",
                          background:"#ede9fe",color:"#5b21b6",borderRadius:3,fontWeight:700}}>
                          {Math.round(totals.minutes)}m
                        </span>
                      </div>
                      <span style={{color:"var(--muted)",fontSize:14,marginLeft:6}}>
                        {icOpen ? "▾" : "▸"}
                      </span>
                    </div>

                    {icOpen && (
                      myAgents.length === 0
                        ? <div style={{padding:"14px 20px",fontSize:11,color:"var(--muted)",
                            fontFamily:"var(--fm)",background:"#fff",borderTop:"1px solid #f0f0f0"}}>
                            No agents assigned to this member yet.
                          </div>
                        : <AgentTable agentList={myAgents} icEmail={u.email} showCreatedBy={true}/>
                    )}
                  </div>
                );
              })}
            </div>
          );
        })}

        {/* Agents with zero campaigns triggered by known members */}
        {unusedAgents.length > 0 && (
          <div style={{border:"1.5px solid var(--border)",borderRadius:2,overflow:"hidden"}}>
            <div style={{background:"#f0f0f0",padding:"12px 18px",fontFamily:"var(--fd)",
              fontWeight:900,fontSize:11,letterSpacing:".12em",textTransform:"uppercase",
              color:"var(--muted)",display:"flex",gap:10}}>
              <span>Unused Agents</span>
              <span style={{fontWeight:400,color:"#aaa"}}>
                · no campaigns triggered yet · {unusedAgents.length} agent{unusedAgents.length!==1?"s":""}
              </span>
            </div>
            <AgentTable agentList={unusedAgents} icEmail={""} showCreatedBy={true}/>
          </div>
        )}

        {teams.length === 0 && (
          <div className="t-empty">No team members found.</div>
        )}
      </div>
    </div>
  );
}

function NewQueryModal({ user, onClose, onSaved }) {
  const [title, setTitle] = useState("");
  const [desc, setDesc] = useState("");
  const [screenshot, setScreenshot] = useState(null); // base64
  const [screenshotName, setScreenshotName] = useState("");
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const fileRef = useRef(null);

  function handleFile(e) {
    const f = e.target.files[0];
    if (!f) return;
    if (!f.type.startsWith("image/")) { setErr("Please upload an image file."); return; }
    if (f.size > 5 * 1024 * 1024) { setErr("Image must be under 5MB."); return; }
    setScreenshotName(f.name);
    const reader = new FileReader();
    reader.onload = ev => setScreenshot(ev.target.result);
    reader.readAsDataURL(f);
  }

  async function submit() {
    if (!title.trim()) { setErr("Please add a title."); return; }
    if (!desc.trim()) { setErr("Please describe your issue."); return; }
    setBusy(true); setErr("");
    const r = await api("raiseSupportQuery", {
      title: title.trim(),
      description: desc.trim(),
      screenshot: screenshot || null,
      screenshotName: screenshotName || null,
    });
    setBusy(false);
    if (!r.ok) { setErr(r.message || r.error || "Failed to submit."); return; }
    onSaved();
  }

  return (
    <div className="t-modal-bg" onClick={e=>{ if(e.target===e.currentTarget) onClose(); }}>
      <div className="t-modal t-fade" style={{maxWidth:540}}>
        <div className="t-modal-hd">
          <span style={{textTransform:"none",letterSpacing:0,fontSize:15}}>Raise a Query</span>
          <button onClick={onClose} style={{background:"none",border:"none",color:"rgba(255,255,255,.6)",cursor:"pointer",fontSize:20}}>×</button>
        </div>
        <div className="t-modal-body" style={{display:"flex",flexDirection:"column",gap:14}}>
          <div>
            <label className="t-label">Title <span style={{color:"var(--red)"}}>*</span></label>
            <input className="t-input" value={title} onChange={e=>setTitle(e.target.value)} placeholder="Brief summary of your issue" autoFocus maxLength={120}/>
          </div>
          <div>
            <label className="t-label">Description <span style={{color:"var(--red)"}}>*</span></label>
            <textarea className="t-input" rows={4} value={desc} onChange={e=>setDesc(e.target.value)} placeholder="Describe the issue in detail…" style={{resize:"vertical",fontSize:13,lineHeight:1.6,fontFamily:"var(--fb)"}}/>
          </div>
          <div>
            <label className="t-label">Screenshot (optional)</label>
            <div
              onClick={()=>fileRef.current?.click()}
              style={{border:"2px dashed var(--border)",padding:"16px 20px",textAlign:"center",cursor:"pointer",background:"#fafafa",borderRadius:3,transition:"border-color .15s"}}
              onMouseEnter={e=>e.currentTarget.style.borderColor="var(--black)"}
              onMouseLeave={e=>e.currentTarget.style.borderColor="var(--border)"}
            >
              {screenshot
                ? <div><img src={screenshot} alt="preview" style={{maxHeight:120,maxWidth:"100%",border:"1px solid #ddd",borderRadius:3}}/><div style={{fontSize:11,color:"var(--muted)",marginTop:6}}>{screenshotName} <span onClick={e=>{e.stopPropagation();setScreenshot(null);setScreenshotName("");}} style={{color:"var(--red)",cursor:"pointer",marginLeft:8}}>✕ Remove</span></div></div>
                : <div><div style={{fontSize:11,color:"var(--muted)"}}>Click to upload a screenshot</div><div style={{fontSize:10,color:"#bbb",marginTop:4}}>PNG, JPG, GIF — max 5MB</div></div>
              }
            </div>
            <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={handleFile}/>
          </div>
          {err && <Alert type="error">{err}</Alert>}
        </div>
        <div className="t-modal-footer">
          <button onClick={onClose} className="t-btn t-btn-outline">Cancel</button>
          <button onClick={submit} disabled={busy} className="t-btn t-btn-black">{busy?<Spin/>:"Submit Query"}</button>
        </div>
      </div>
    </div>
  );
}

function QueryDetailModal({ query, user, isSuperAdmin, onClose, onUpdated }) {
  const [resolution, setResolution] = useState(query.resolution || "");
  const [status, setStatus] = useState(query.status || "Open");
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const [msg, setMsg] = useState("");

  async function saveResolution() {
    if (!resolution.trim()) { setErr("Please enter a resolution."); return; }
    setBusy(true); setErr(""); setMsg("");
    const r = await api("resolveSupportQuery", {
      queryId: query._id,
      resolution: resolution.trim(),
      status,
    });
    setBusy(false);
    if (!r.ok) { setErr(r.message || r.error || "Failed."); return; }
    setMsg("Saved! An email has been sent to the user.");
    onUpdated({ ...query, resolution: resolution.trim(), status });
  }

  const sc = query.status === "Resolved"
    ? { bg:"#d1fae5", color:"#065f46" }
    : query.status === "In Progress"
    ? { bg:"#e8f0fe", color:"#1e40af" }
    : { bg:"#fff3cd", color:"#92400e" };

  return (
    <div className="t-modal-bg" onClick={e=>{ if(e.target===e.currentTarget) onClose(); }}>
      <div className="t-modal t-fade" style={{maxWidth:600}}>
        <div className="t-modal-hd">
          <span style={{textTransform:"none",letterSpacing:0,fontSize:15,flex:1,paddingRight:12}}>{query.title}</span>
          <span style={{padding:"3px 10px",fontSize:10,fontFamily:"var(--fd)",fontWeight:700,background:sc.bg,color:sc.color,borderRadius:3,marginRight:12}}>{query.status||"Open"}</span>
          <button onClick={onClose} style={{background:"none",border:"none",color:"rgba(255,255,255,.6)",cursor:"pointer",fontSize:20}}>×</button>
        </div>
        <div className="t-modal-body" style={{display:"flex",flexDirection:"column",gap:14}}>
          <div style={{fontSize:11,fontFamily:"var(--fm)",color:"var(--muted)",display:"flex",gap:16,flexWrap:"wrap"}}>
            <span>Raised by: <b style={{color:"var(--black)"}}>{query.raisedByName||query.raisedByEmail||"—"}</b></span>
            <span>{query.raisedAt ? fmtDT(query.raisedAt) : "—"}</span>
          </div>

          <div style={{background:"#f8f8f8",border:"1.5px solid #eee",padding:"12px 14px",borderRadius:3}}>
            <div style={{fontFamily:"var(--fd)",fontWeight:700,fontSize:9,letterSpacing:".18em",textTransform:"uppercase",color:"var(--muted)",marginBottom:6}}>Issue Description</div>
            <div style={{fontSize:13,lineHeight:1.7,whiteSpace:"pre-wrap"}}>{query.description}</div>
          </div>

          {query.screenshot && (
            <div>
              <div style={{fontFamily:"var(--fd)",fontWeight:700,fontSize:9,letterSpacing:".18em",textTransform:"uppercase",color:"var(--muted)",marginBottom:6}}>Screenshot</div>
              <img src={query.screenshot} alt="screenshot" style={{maxWidth:"100%",maxHeight:280,border:"1.5px solid #ddd",borderRadius:3,display:"block"}}/>
            </div>
          )}

          {query.resolution && !isSuperAdmin && (
            <div style={{background:"#f0fff7",border:"1.5px solid #6ee7b7",padding:"12px 14px",borderRadius:3}}>
              <div style={{fontFamily:"var(--fd)",fontWeight:700,fontSize:9,letterSpacing:".18em",textTransform:"uppercase",color:"var(--green)",marginBottom:6}}>✓ Resolution</div>
              <div style={{fontSize:13,lineHeight:1.7,whiteSpace:"pre-wrap"}}>{query.resolution}</div>
            </div>
          )}

          {isSuperAdmin && (
            <div style={{borderTop:"1.5px solid #eee",paddingTop:14}}>
              <div style={{fontFamily:"var(--fd)",fontWeight:700,fontSize:9,letterSpacing:".18em",textTransform:"uppercase",color:"var(--muted)",marginBottom:8}}>Admin Resolution</div>
              <div style={{display:"flex",gap:8,marginBottom:10}}>
                {["Open","In Progress","Resolved"].map(s=>(
                  <button key={s} onClick={()=>setStatus(s)} style={{padding:"5px 14px",fontSize:10,fontFamily:"var(--fd)",fontWeight:700,border:"2px solid",borderColor:status===s?"var(--black)":"var(--border)",background:status===s?"var(--black)":"#fff",color:status===s?"#fff":"var(--muted)",cursor:"pointer",borderRadius:3,letterSpacing:".06em"}}>
                    {s}
                  </button>
                ))}
              </div>
              <textarea className="t-input" rows={4} value={resolution} onChange={e=>setResolution(e.target.value)} placeholder="Type your resolution / response here…" style={{resize:"vertical",fontSize:13,lineHeight:1.6,fontFamily:"var(--fb)",marginBottom:8}}/>
              <div style={{fontSize:10,color:"var(--muted)",fontFamily:"var(--fm)",marginBottom:8}}>Saving will email the user at <b>{query.raisedByEmail}</b></div>
              {err && <Alert type="error">{err}</Alert>}
              {msg && <Alert type="success">{msg}</Alert>}
              <div style={{display:"flex",gap:8,marginTop:8}}>
                <button onClick={saveResolution} disabled={busy} className="t-btn t-btn-black">{busy?<Spin/>:"Save & Notify User"}</button>
              </div>
            </div>
          )}
        </div>
        <div className="t-modal-footer">
          <button onClick={onClose} className="t-btn t-btn-outline">Close</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
