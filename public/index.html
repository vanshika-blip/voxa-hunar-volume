function CampaignQualifiedTab({ campaign }) {
  const [leads,setLeads]=useState([]); const [headers,setHeaders]=useState([]); const [loading,setLoading]=useState(true);
  useEffect(()=>{
    (async()=>{
      setLoading(true);
      const r=await api("getLeads",{agentCode:campaign.agentCode, filter:{requestId:campaign.requestId}});
      setLoading(false);
      if(r.ok){setLeads(r.leads||[]);setHeaders(r.headers||[]);}
    })();
  },[campaign.requestId]);

const fixedCols = ["Callee Name","Mobile Number","Started At","Assigned To Email","Call Status","Feedback","Selection Process","Turnup Status","Remarks","Recording URL"];
  const dateCols = headers.filter(h => isDateCol(h) && !fixedCols.includes(h));
  const outCols = headers.filter(h=>h.startsWith("out."));
  const inCols = headers.filter(h=>h.startsWith("in."));
  const shownHeaders = [...fixedCols.filter(h=>headers.includes(h)), ...dateCols, ...outCols, ...inCols];
  const { filters, filtered, colValues, setColFilter, clearFilters } = useTableFilters(leads, shownHeaders);
  const hasFilters = Object.keys(filters).length > 0;

  function colLabel(h) {
    if(h==="Recording URL") return "Recording";
    if(h.startsWith("out.")) return h.slice(4);
    if(h.startsWith("in.")) return "↓"+h.slice(3);
    return h;
  }
  function renderCell(h, val, lead) {
    const strVal = String(val??"")||"";
    if(h==="Recording URL") return <RecBtn url={strVal}/>;
    if(isDateCol(h)) return <DateCell value={strVal}/>;
    if(!strVal) return <span style={{color:"#ccc"}}>—</span>;
    if(h==="Remarks") return <RemarksCell name={String(lead?.["Callee Name"]||"")} value={strVal} readOnly/>;
    if(h==="Call Status"||h==="Feedback"||h==="Selection Process"||h==="Turnup Status") return <LeadPill value={strVal}/>;
    if(h.startsWith("out.")||h.startsWith("in.")) return <div className="out-cell" title={strVal}>{strVal}</div>;
    if(h==="Mobile Number") return <span className="t-mono">{strVal}</span>;
    return <span style={{fontSize:12}}>{strVal}</span>;
  }

  if(loading) return <div style={{padding:60,textAlign:"center"}}><Spin/></div>;
  if(leads.length===0) return <div className="t-empty">No qualified leads for this campaign.</div>;
  return (
    <div>
      {hasFilters && <div style={{padding:"6px 12px",background:"#fffbe0",borderBottom:"1px solid #ffc600",display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:11}}>Filtered: {filtered.length} of {leads.length}</span><button className="t-btn t-btn-sm t-btn-outline" onClick={clearFilters}>Clear ×</button></div>}
      <div className="t-tbl-wrap">
        <table className="t-tbl">
          <thead>
            <tr>{shownHeaders.map(h=><th key={h} style={h==="Feedback"?{minWidth:200}:{}}>{colLabel(h)}</th>)}</tr>
            <tr className="filter-row">{shownHeaders.map(h=><td key={h} style={{padding:"2px 3px"}}><ExcelColFilter header={colLabel(h)} values={colValues[h]||[]} selected={filters[h]||null} onChange={v=>setColFilter(h,v)}/></td>)}</tr>
          </thead>
          <tbody>{filtered.map((lead,i)=><tr key={i}>{shownHeaders.map(h=><td key={h} style={h==="Feedback"?{minWidth:200}:{}}>{renderCell(h,lead[h],lead)}</td>)}</tr>)}</tbody>
        </table>
      </div>
    </div>
  );
}

function CampaignMasterTab({ campaign }) {
  const [rows,setRows]=useState([]); const [headers,setHeaders]=useState([]); const [loading,setLoading]=useState(true);
  const [passingToQL, setPassingToQL] = useState(new Set());
  const [passedToQL, setPassedToQL] = useState(new Set());
  const [passMsg, setPassMsg] = useState("");

  useEffect(()=>{
    (async()=>{
      setLoading(true);
      const r=await api("getMasterTracker",{agentCode:campaign.agentCode, requestId:campaign.requestId});
      setLoading(false);
      if(r.ok){setRows(r.rows||[]);setHeaders(r.headers||[]);}
      else {
        const r2=await api("getLeads",{agentCode:campaign.agentCode, filter:{requestId:campaign.requestId}});
        if(r2.ok){setRows(r2.leads||[]);setHeaders(r2.headers||[]);}
      }
    })();
  },[campaign.requestId]);

  async function passToQL(row) {
    const callId = String(row["Call ID"] || "").trim();
    if (!callId) return;
    setPassingToQL(prev => new Set([...prev, callId]));
    setPassMsg("");
    const r = await api("passToQualifiedLeads", { agentCode: campaign.agentCode, callId });
    setPassingToQL(prev => { const n = new Set(prev); n.delete(callId); return n; });
    if (r.ok || r.error === "ALREADY_IN_QL") {
      setPassedToQL(prev => new Set([...prev, callId]));
      setPassMsg(r.error === "ALREADY_IN_QL" ? "Already in qualified leads." : "✓ Added to qualified leads!");
    } else {
      setPassMsg("Failed: " + (r.message || r.error));
    }
    setTimeout(()=>setPassMsg(""), 3000);
  }

  const metaCols = ["Call ID","Callee Name","Mobile Number","Status","Duration (Minutes)","Duration (Seconds)","Started At","Ended At","Answered By","Engagement Status","Call Ended By","Recording URL"];
  const outCols = headers.filter(h=>h.startsWith("out."));
  const inCols = headers.filter(h=>h.startsWith("in."));
  const shownHeaders = [...metaCols.filter(h=>headers.includes(h)), ...inCols, ...outCols];
  const { filters, filtered, colValues, setColFilter, clearFilters } = useTableFilters(rows, shownHeaders);
  const hasFilters = Object.keys(filters).length > 0;

  function colLabel(h) {
    if(h==="Recording URL") return "Recording";
    if(h.startsWith("out.")) return h.slice(4);
    if(h.startsWith("in.")) return "↓"+h.slice(3);
    return h;
  }
  function renderCell(h, val) {
    const strVal = String(val??"")||"";
    if(h==="Recording URL") return <RecBtn url={strVal}/>;
    if(!strVal) return <span style={{color:"#ccc"}}>—</span>;
    if(h.startsWith("out.")||h.startsWith("in.")) return <div className="out-cell" title={strVal}>{strVal}</div>;
    if(h==="Status") return <StatusPill status={strVal}/>;
    if(h==="Call ID"||h==="Mobile Number") return <span className="t-mono" style={{fontSize:10}}>{strVal}</span>;
    if(h==="Started At"||h==="Ended At") return <span style={{fontSize:10,fontFamily:"var(--fm)",color:"var(--muted)"}}>{strVal?fmtDT(strVal):""}</span>;
    return <span style={{fontSize:12}}>{strVal}</span>;
  }

  if(loading) return <div style={{padding:60,textAlign:"center"}}><Spin/></div>;
  if(rows.length===0) return <div className="t-empty">No completed calls for this campaign yet.</div>;
  return (
    <div>
      <div style={{padding:"8px 14px",background:"#f0f5ff",borderBottom:"1px solid #c7d7f5",display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
        <span style={{fontSize:11,color:"var(--blue)",fontFamily:"var(--fb)"}}>Showing <b>{filtered.length}</b> calls{hasFilters && <> (filtered from {rows.length})</>}</span>
        {hasFilters && <button className="t-btn t-btn-sm t-btn-outline" onClick={clearFilters}>Clear filters ×</button>}
        {passMsg && <span style={{fontSize:11,color:passMsg.startsWith("✓")?"var(--green)":"var(--red)",fontWeight:600,fontFamily:"var(--fb)"}}>{passMsg}</span>}
        <span style={{marginLeft:"auto",fontSize:10,color:"var(--muted)",fontFamily:"var(--fb)"}}>Use <b>→ Pass to QL</b> to manually add a candidate to Qualified Leads</span>
      </div>
      <div className="t-tbl-wrap">
        <table className="t-tbl">
          <thead>
            <tr>{shownHeaders.map(h=><th key={h}>{colLabel(h)}</th>)}<th style={{background:"#f0fff7",color:"var(--green)"}}>→ QL</th></tr>
            <tr className="filter-row">{shownHeaders.map(h=><td key={h} style={{padding:"2px 3px"}}><ExcelColFilter header={colLabel(h)} values={colValues[h]||[]} selected={filters[h]||null} onChange={v=>setColFilter(h,v)}/></td>)}<td/></tr>
          </thead>
          <tbody>
            {filtered.map((row,i)=>{
              const callId = String(row["Call ID"] || "").trim();
              const alreadyPassed = passedToQL.has(callId);
              const isPassing = passingToQL.has(callId);
              return (
                <tr key={i}>
                  {shownHeaders.map(h=><td key={h}>{renderCell(h,row[h])}</td>)}
                  <td style={{background:"#fafff8",borderLeft:"1px solid #e0f5e8"}}>
                    {alreadyPassed ? <span className="pass-ql-done">✓ In QL</span> : isPassing ? <span style={{display:"inline-flex",alignItems:"center",gap:4,fontSize:11,color:"var(--muted)"}}><Spin/>Adding…</span> : <button className="pass-ql-btn" onClick={()=>passToQL(row)}><svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M1 5h8M6 2l3 3-3 3"/></svg>Pass to QL</button>}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

    (async()=>{

        ))}
      </div>
      {loading && <div style={{padding:60,textAlign:"center"}}><Spin/></div>}

          <div className="t-tbl-wrap">
            <table className="t-tbl">
              <thead>
                <tr>{shownHeaders.map(h=><th key={h}>{h}</th>)}</tr>
                <tr className="filter-row">{shownHeaders.map(h=><td key={h} style={{padding:"2px 3px"}}><ExcelColFilter header={h} values={colValues[h]||[]} selected={filters[h]||null} onChange={v=>setColFilter(h,v)}/></td>)}</tr>
              </thead>
              <tbody>{filtered.map((row,i)=><tr key={i}>{shownHeaders.map(h=><td key={h}>{renderCell(h,row[h])}</td>)}</tr>)}</tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}

function AgentsView({ onChange, users }) {
  const [agents,setAgents]=useState([]); const [loading,setLoading]=useState(true);
  const [busy,setBusy]=useState(false); const [editing,setEditing]=useState(null); const [msg,setMsg]=useState("");
  const [viewMode,setViewMode]=useState("all"); // "all" | "byteam"
  async function refresh(){ setLoading(true); const r=await api("listAgents",{}); setLoading(false); if(r.ok){setAgents(r.agents||[]);onChange&&onChange(r.agents||[]);} }
  useEffect(()=>{refresh();},[]);
  async function sync(){ setBusy(true); setMsg(""); const r=await api("syncAgents",{}); setBusy(false); if(!r.ok)return setMsg("Sync failed: "+(r.message||r.error)); setMsg("Synced "+r.synced+" agents."); refresh(); }
  async function save(a){ const r=await api("upsertAgent",{agent:a}); if(!r.ok)return alert(r.message||r.error); setEditing(null); refresh(); }
  async function toggleActive(a){ await api("upsertAgent",{agent:{agentCode:a.agentCode,active:!a.active}}); refresh(); }
  const active=agents.filter(a=>a.active).length;
  // Build per-team agent breakdown from createdBy
  const teamAgents = useMemo(()=>{
    const emailToTeam = {};
    (users||[]).forEach(u=>{ if(u.team && u.email) emailToTeam[u.email.toLowerCase()]=u.team; });
    const byTeam = {};
    agents.forEach(a=>{
      const team = emailToTeam[(a.createdBy||"").toLowerCase()] || "(unassigned)";
      if(!byTeam[team]) byTeam[team]=[];
      byTeam[team].push(a);
    });
    return byTeam;
  },[agents,users]);
  return (
    <div className="t-fade">
      <div className="t-mast">
        <div><div className="t-mast-title">Agents</div><div className="t-mast-sub">{agents.length} total · {active} active</div></div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={sync} disabled={busy} className="t-btn t-btn-outline" style={{color:"var(--black)",borderColor:"var(--black)"}}>{busy?<Spin/>:"Sync from Hunar"}</button>
        </div>
      </div>
      {msg && <div style={{padding:"10px 20px"}}><Alert type="info">{msg}</Alert></div>}
      <div style={{padding:"0 20px",display:"flex",gap:0,borderBottom:"2px solid var(--border)",background:"#fff"}}>
        {[{id:"all",label:"All Agents"},{id:"byteam",label:"By Team"}].map(t=>(
          <button key={t.id} onClick={()=>setViewMode(t.id)} style={{padding:"10px 18px",fontFamily:"var(--fd)",fontWeight:700,fontSize:11,letterSpacing:".08em",border:"none",borderBottom:viewMode===t.id?"2.5px solid var(--black)":"2.5px solid transparent",background:"none",cursor:"pointer",color:viewMode===t.id?"var(--black)":"var(--muted)"}}>
            {t.label}
          </button>
        ))}
      </div>
      {viewMode==="byteam" && (
        <div style={{padding:20}}>
          {Object.keys(teamAgents).sort((a,b)=>a==="(unassigned)"?1:b==="(unassigned)"?-1:a.localeCompare(b)).map(teamName=>(
            <div key={teamName} style={{marginBottom:24,border:"1.5px solid var(--border)",borderRadius:4,overflow:"hidden"}}>
              <div style={{background:"var(--black)",color:"#fff",padding:"10px 16px",fontFamily:"var(--fd)",fontWeight:900,fontSize:12,letterSpacing:".12em",textTransform:"uppercase",display:"flex",alignItems:"center",gap:10}}>
                <span>{teamName}</span>
                <span style={{fontWeight:400,opacity:.6,fontSize:10,letterSpacing:".05em"}}>{teamAgents[teamName].filter(a=>a.active).length} active · {teamAgents[teamName].length} total</span>
              </div>
              <div style={{padding:12,display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:10}}>
                {teamAgents[teamName].map(a=>(
                  <div key={a.agentCode} style={{background:"#fafafa",border:"1.5px solid #e8e8e8",borderRadius:6,padding:"12px 14px"}}>
                    <div style={{fontFamily:"var(--fd)",fontWeight:900,fontSize:13,marginBottom:3,display:"flex",alignItems:"center",gap:8}}>
                      {a.displayName}
                      {a.active?<span className="t-pill t-pill-done" style={{fontSize:7}}>Live</span>:<span className="t-pill t-pill-arch" style={{fontSize:7}}>Off</span>}
                    </div>
                    <div style={{fontFamily:"var(--fm)",fontSize:10,color:"var(--muted)",marginBottom:4}}>{a.agentCode}</div>
                    <div style={{fontSize:10,color:"#888"}}>Added by: <b style={{color:"var(--black)"}}>{a.createdBy||"—"}</b></div>
                    {(a.qualificationRules||[]).length>0 ? (
                      <div style={{marginTop:4,fontSize:9,color:"var(--green)",fontWeight:700}}>✓ {(a.qualificationRules||[]).length} qual rule{(a.qualificationRules||[]).length!==1?"s":""}</div>
                    ) : (
                      <div style={{marginTop:4,fontSize:9,color:"var(--muted)"}}>No qual rules</div>
                    )}
                    <div style={{marginTop:8,display:"flex",gap:6}}>
                      <button onClick={()=>setEditing(a)} className="t-btn t-btn-outline t-btn-sm">Edit</button>
                      <button onClick={()=>toggleActive(a)} className="t-btn t-btn-outline t-btn-sm">{a.active?"Deactivate":"Activate"}</button>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          ))}
          {Object.keys(teamAgents).length===0 && <div className="t-empty">No agents yet.</div>}
        </div>
      )}
      {viewMode==="all" && (<div className="t-board">
        <div className="t-board-hd"><h2 className="t-board-hd-title">All Agents</h2><span className="t-board-meta">{agents.length} agents</span></div>
        {loading ? <div style={{padding:60,textAlign:"center"}}><Spin/></div> : agents.length===0 ? (
          <div className="t-empty">No agents yet. Click <b>Sync from Hunar</b> to import.</div>
        ) : (
          <div className="t-tbl-wrap">
            <table className="t-tbl">
              <thead><tr><th>Agent</th><th>Code</th><th>Added By</th><th>Language</th><th>Input Fields</th><th>Qualification Rule</th><th>Status</th><th>Actions</th></tr></thead>
              <tbody>
                {agents.map(a=>{
                  const rules = a.qualificationRules || (a.qualificationField ? [{field: a.qualificationField, keywords: a.qualificationValues||[]}] : []);
                  return (
                    <tr key={a.agentCode}>
                      <td><div className="t-tbl nm">{a.displayName}</div><div className="t-tbl nm-sub">{a.description?.slice(0,60)}</div></td>
                      <td><span className="t-mono">{a.agentCode}</span></td>
                      <td><span className="t-mono" style={{fontSize:10,color:"var(--muted)"}}>{a.createdBy||"—"}</span></td>
                      <td style={{fontSize:11}}>{a.language}</td>
                      <td>{(a.customVariables||[]).map(v=><span key={v} className="t-pill t-pill-gray" style={{marginRight:2,marginBottom:2}}>{v}</span>)}</td>
                      <td style={{fontSize:11}}>
                        {rules.length===0 ? <span style={{color:"var(--muted)"}}>not set</span> : rules.map((r,i)=>(
                          <div key={i} style={{marginBottom:2}}>
                            <span className="t-mono" style={{fontSize:10,color:"var(--blue)"}}>{r.field}</span>
                            {r.keywords?.length>0 ? r.keywords.slice(0,3).map(k=><span key={k} className="t-pill t-pill-blue" style={{fontSize:8,marginLeft:3}}>~{k}</span>) : <span style={{color:"var(--muted)",fontSize:10}}> = any</span>}
                            {r.keywords?.length>3 && <span style={{fontSize:9,color:"var(--muted)"}}>+{r.keywords.length-3}</span>}
                          </div>
                        ))}
                      </td>
                      <td>{a.active?<span className="t-pill t-pill-done">Active</span>:<span className="t-pill t-pill-arch">Inactive</span>}</td>
                      <td>
                        <div style={{display:"flex",gap:4}}>
                          <button onClick={()=>setEditing(a)} className="t-btn t-btn-outline t-btn-sm">Edit</button>
                          <button onClick={()=>toggleActive(a)} className="t-btn t-btn-outline t-btn-sm">{a.active?"Deactivate":"Activate"}</button>
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </div>)}
      {editing && <AgentEditModal agent={editing} onSave={save} onClose={()=>setEditing(null)}/>}
    </div>
  );
}

function AgentEditModal({ agent, onSave, onClose }) {
  const [a, setA] = useState({...agent});
  const [qualRules, setQualRules] = useState(() => {
    const rules = {};
    if (agent.qualificationRules && Array.isArray(agent.qualificationRules) && agent.qualificationRules.length) {
      agent.qualificationRules.forEach(r => { if(r.field) rules[r.field] = r.keywords || []; });
    } else if (agent.qualificationField) {
      const kws = agent.qualificationValues?.length ? [...agent.qualificationValues] : agent.qualificationValue ? [agent.qualificationValue] : [];
      rules[agent.qualificationField] = kws;
    }
    return rules;
  });
  const [kwInputs, setKwInputs] = useState({});
  const resultFields = useMemo(() => {
    const s = agent.resultSchema || {};
    if (s.properties) return Object.keys(s.properties);
    return Object.keys(s).filter(k => k !== "type" && k !== "required");
  }, [agent.resultSchema]);
  const selectedFields = Object.keys(qualRules);
  function toggleField(field) { setQualRules(prev => { const next = {...prev}; if (next[field] !== undefined) { delete next[field]; } else { next[field] = []; } return next; }); }
  function addKeyword(field) {
    const kw = (kwInputs[field] || "").trim();
    if (!kw) return;
    setQualRules(prev => { const existing = prev[field] || []; if (existing.map(k=>k.toLowerCase()).includes(kw.toLowerCase())) return prev; return {...prev, [field]: [...existing, kw]}; });
    setKwInputs(prev => ({...prev, [field]: ""}));
  }
  function removeKeyword(field, kw) { setQualRules(prev => ({...prev, [field]: (prev[field]||[]).filter(k=>k!==kw)})); }
  function doSave() {
    const rules = Object.entries(qualRules).filter(([f]) => f).map(([field, keywords]) => ({field, keywords}));
    const firstField = rules[0]?.field || "";
    const allKeywords = rules.flatMap(r => r.keywords);
    onSave({...a, qualificationRules: rules, qualificationField: firstField, qualificationValues: allKeywords, qualificationValue: allKeywords[0] || ""});
  }
  return (
    <div className="t-modal-bg">
      <div className="t-modal t-fade" style={{maxWidth:600}}>
        <div className="t-modal-hd"><span>Edit Agent — {agent.displayName||agent.agentCode}</span><button onClick={onClose} style={{background:"none",border:"none",color:"rgba(255,255,255,.6)",cursor:"pointer",fontSize:18,lineHeight:1}}>×</button></div>
        <div className="t-modal-body" style={{display:"flex",flexDirection:"column",gap:12}}>
          <div style={{fontSize:9,fontFamily:"var(--fm)",color:"var(--muted)"}}>Hunar ID: {agent.agentId} · Added by: {agent.createdBy||"—"}</div>
          <div><label className="t-label">Display Name</label><input className="t-input" value={a.displayName||""} onChange={e=>setA({...a,displayName:e.target.value})}/></div>
          <div><label className="t-label">Description</label><textarea className="t-input" rows={2} value={a.description||""} onChange={e=>setA({...a,description:e.target.value})}/></div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <div><label className="t-label">Agent Code</label><input className="t-input" value={a.agentCode||""} disabled style={{background:"#f5f5f5",color:"var(--muted)"}}/></div>
            <div><label className="t-label">Est. Seconds / Call</label><input className="t-input" type="number" value={a.estSecondsPerCall||180} onChange={e=>setA({...a,estSecondsPerCall:Number(e.target.value)})}/></div>
          </div>
          <div style={{border:"2px solid var(--black)",padding:12}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}><span style={{background:"var(--black)",color:"#fff",padding:"2px 7px",fontFamily:"var(--fd)",fontWeight:900,fontSize:8,letterSpacing:".2em"}}>QUALIFICATION RULE</span></div>
            <label className="t-label" style={{marginBottom:6}}>Pick output field(s)</label>
            {resultFields.length===0 ? <div style={{fontSize:11,color:"var(--muted)",fontStyle:"italic"}}>No result schema fields found.</div> : (
              <div style={{border:"1.5px solid var(--black)",background:"#fafafa",marginBottom:10}}>
                {resultFields.map(f=>{
                  const isSelected = qualRules[f] !== undefined;
                  return (
                    <label key={f} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",borderBottom:"1px solid #f0f0f0",cursor:"pointer",background:isSelected?"#f0f5ff":"transparent"}}>
                      <input type="checkbox" checked={isSelected} onChange={()=>toggleField(f)} style={{width:13,height:13}}/>
                      <span style={{flex:1,fontFamily:"var(--fm)",fontSize:11}}>{f}</span>
                    </label>
                  );
                })}
              </div>
            )}
            {selectedFields.map(field=>{
              const keywords = qualRules[field]||[];
              return (
                <div key={field} style={{border:"1.5px solid #0066b3",padding:"8px 10px",marginBottom:8}}>
                  <div style={{fontFamily:"var(--fm)",fontSize:11,fontWeight:700,color:"var(--blue)",marginBottom:6}}>{field}</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:3,marginBottom:6}}>{keywords.map(kw=><span key={kw} className="t-kwtag">~{kw}<button className="t-kwtag-rm" onClick={()=>removeKeyword(field,kw)}>×</button></span>)}</div>
                  <div style={{display:"flex",gap:6}}>
                    <input className="t-input" style={{flex:1,fontSize:11,padding:"5px 8px"}} value={kwInputs[field]||""} onChange={e=>setKwInputs(prev=>({...prev,[field]:e.target.value}))} onKeyDown={e=>{if(e.key==="Enter"){e.preventDefault();addKeyword(field);}}} placeholder="Add keyword…"/>
                    <button className="t-btn t-btn-black t-btn-sm" onClick={()=>addKeyword(field)}>+ Add</button>
                  </div>
                </div>
              );
            })}
          </div>
          <label style={{display:"flex",alignItems:"center",gap:7,fontSize:12,cursor:"pointer"}}><input type="checkbox" style={{width:"auto"}} checked={!!a.active} onChange={e=>setA({...a,active:e.target.checked})}/>Active</label>
        </div>
        <div className="t-modal-footer">
          <button onClick={onClose} className="t-btn t-btn-outline">Cancel</button>
          <button onClick={doSave} className="t-btn t-btn-black">Save Agent</button>
        </div>
      </div>
    </div>
  );
}

function UsersView({ user, teams, extraHeaderActions }) {
  const [users,setUsers]=useState([]); const [loading,setLoading]=useState(true);
  const [editing,setEditing]=useState(null); const [adding,setAdding]=useState(false);
  async function refresh(){ setLoading(true); const r=await api("listUsers",{}); setLoading(false); if(r.ok)setUsers(r.users||[]); }
  useEffect(()=>{refresh();},[]);
  async function save(u){ const r=await api("upsertUser",{user:u}); if(r.ok){setEditing(null);setAdding(false);refresh();} else alert(r.message||r.error); }
  async function resend(email){ const r=await api("resendInvite",{email}); if(r.ok)alert("Invite resent."); else alert(r.message||r.error); }
  async function deactivate(email){ if(!confirm("Deactivate "+email+"?"))return; await api("deleteUser",{email}); refresh(); }
  async function setLimit(email,minutes){ await api("setLimit",{email,minutes:Number(minutes)}); refresh(); }
  const canDeactivate = user.role === "super_admin";
  return (
    <div className="t-fade">
      <div className="t-mast">
        <div><div className="t-mast-title">Users</div><div className="t-mast-sub">{users.filter(u=>u.active).length} active · {users.filter(u=>u.pending).length} pending</div></div>
        <div style={{display:"flex",alignItems:"center"}}>
          {extraHeaderActions}
          <button onClick={()=>setAdding(true)} className="t-btn t-btn-outline" style={{color:"var(--black)",borderColor:"var(--black)"}}>+ Add User</button>
        </div>
      </div>
      <div className="t-board">
        <div className="t-board-hd"><h2 className="t-board-hd-title">Team Members</h2></div>
        {loading ? <div style={{padding:60,textAlign:"center"}}><Spin/></div> : users.length===0 ? (
          <div className="t-empty">No users found.</div>
        ) : (
          <div className="t-tbl-wrap">
            <table className="t-tbl">
              <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Team</th><th>Daily Limit</th><th>Status</th><th>Actions</th></tr></thead>
              <tbody>
                {users.map(u=>(
                  <tr key={u.email}>
                    <td><div className="t-tbl nm">{u.name}</div></td>
                    <td><span className="t-mono" style={{fontSize:10}}>{u.email}</span></td>
                    <td><RoleTag role={u.role}/></td>
                    <td style={{fontSize:11}}>{u.team||"—"}</td>
                    <td>{(user.role==="super_admin"||user.role==="admin")?<input className="t-input" type="number" defaultValue={u.dailyMinuteLimit} onBlur={e=>{if(Number(e.target.value)!==u.dailyMinuteLimit)setLimit(u.email,e.target.value);}} style={{width:70,padding:"4px 6px"}}/>:u.dailyMinuteLimit}</td>
                    <td>{!u.active?<span className="t-pill t-pill-live">Deactivated</span>:u.pending?<span className="t-pill t-pill-hold">Pending</span>:<span className="t-pill t-pill-done">Active</span>}</td>
                    <td>
                      <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                        <button onClick={()=>setEditing(u)} className="t-btn t-btn-outline t-btn-sm">Edit</button>
                        {(u.pending||!u.active) && <button onClick={()=>resend(u.email)} className="t-btn t-btn-outline t-btn-sm">Resend</button>}
                        {canDeactivate && u.active && <button onClick={()=>deactivate(u.email)} className="t-btn t-btn-red t-btn-sm">Deactivate</button>}
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>
      {adding&&<UserModal user={{role:"recruiter",active:true,dailyMinuteLimit:90,team:user.role==="team_lead"?user.team:""}} teams={teams} actorRole={user.role} actorTeam={user.team} onSave={save} onClose={()=>setAdding(false)} isNew/>}
      {editing&&<UserModal user={editing} teams={teams} actorRole={user.role} actorTeam={user.team} onSave={save} onClose={()=>setEditing(null)}/>}
    </div>
  );
}
function UserModal({ user, teams, actorRole, actorTeam, onSave, onClose, isNew }) {

    <div className="t-modal-bg">
      <div className="t-modal t-fade">
        <div className="t-modal-hd"><span>{isNew?"Add User":"Edit User"}</span><button onClick={onClose} style={{background:"none",border:"none",color:"rgba(255,255,255,.6)",cursor:"pointer",fontSize:18,lineHeight:1}}>×</button></div>

          <div><label className="t-label">Team</label><select className="t-select" style={{width:"100%"}} value={u.team||""} disabled={locked} onChange={e=>setU({...u,team:e.target.value})}><option value="">— none —</option>{teams.map(t=><option key={t.id} value={t.name}>{t.name}</option>)}</select></div>

      </div>
    </div>
  );

function TeamsView({ user, agents }) {
  const [teams,setTeams]=useState([]); const [loading,setLoading]=useState(true);
  const [editing,setEditing]=useState(null); const [adding,setAdding]=useState(false);
  async function refresh(){ setLoading(true); const r=await api("listTeams",{}); setLoading(false); if(r.ok)setTeams(r.teams||[]); }
  useEffect(()=>{refresh();},[]);
  async function save(t){ const r=await api("upsertTeam",{team:t}); if(r.ok){setEditing(null);setAdding(false);refresh();} else alert(r.message||r.error); }
  return (
    <div className="t-fade">

function TeamModal({ team, agents, onSave, onClose, isNew }) {

// ─────────────────────────────────────────────────────────────
// TL/IC AGENTS VIEW — grouped by creator, with "Add by ID" + wizard
// ─────────────────────────────────────────────────────────────
const VOICE_PERSONAS = ["NEHA","ROY","ZOE","SAM","MIRA","EESHA"];
const LANGUAGES      = ["ENGLISH","HINDI","TAMIL","TURKISH","SPANISH","KANNADA","MARATHI","TELUGU"];

function TLAgentsView({ user, agents: initAgents, refreshAgents }) {
  const [agents, setAgents] = useState(initAgents||[]);
  const [tab, setTab] = useState("active");
  const [mode, setMode] = useState("list"); // list | create | edit | addById | qualEdit
  const [editAgent, setEditAgent] = useState(null);
  const [search, setSearch] = useState("");
  const [saving, setSaving] = useState(false);
  const [msg, setMsg] = useState({type:"",text:""});
const [addedAgentForQual, setAddedAgentForQual] = useState(null);

  useEffect(()=>setAgents(initAgents||[]),[initAgents]);

  const [stats, setStats] = useState({});
  useEffect(()=>{
    (async()=>{
      const r = await api("getCampaigns",{});
      if(!r.ok) return;
      const s={};
      (r.campaigns||[]).forEach(c=>{
        if(!s[c.agentCode]) s[c.agentCode]={campaigns:0,connected:0,total:0};
        s[c.agentCode].campaigns+=1;
        s[c.agentCode].connected+=Number(c.connected||0);
        s[c.agentCode].total+=Number(c.contactsCount||0);
      });
      setStats(s);
    })();
  },[]);

  const myAgents   = agents.filter(a => a.createdBy === user.email);
  const activeList = myAgents.filter(a=>a.active);
  const draftList  = myAgents.filter(a=>!a.active);
  const shown = (tab==="active"?activeList:draftList).filter(a=>!search||a.displayName.toLowerCase().includes(search.toLowerCase()));

  // For recruiters: agents that were added by TL/IC (not the current user) — read-only
  const othersAgents = agents.filter(a => a.createdBy !== user.email && a.active);

  async function doSave(form, qualRules) {
    setSaving(true); setMsg({type:"",text:""});
    const rules = Object.entries(qualRules).filter(([f])=>f).map(([field,keywords])=>({field,keywords}));
    const firstField = rules[0]?.field||"";
    const allKeywords = rules.flatMap(r=>r.keywords);
    const resultSchema = {};
    (form.resultFields||[]).filter(f=>f.name.trim()).forEach(f=>{ resultSchema[f.name.trim()]=f.expected.trim()||"string"; });
    const r = await api("upsertMyAgent",{agent:{
      agentCode:    editAgent?.agentCode||"",
      agentId:      editAgent?.agentId||"",
      displayName:  form.displayName,
      description:  form.objective,
      language:     form.language,
      voicePersona: form.voicePersona,
      agentPrompt:  form.agentPrompt,
      resultPrompt: form.resultPrompt,
      introduction: form.introduction,
      objective:    form.objective,
      resultSchema,
      qualificationRules:  rules,
      qualificationField:  firstField,
      qualificationValues: allKeywords,
      qualificationValue:  allKeywords[0]||"",
      active: true,
    }});
    setSaving(false);
if(!r.ok){ setMsg({type:"error",text:r.message||r.error}); return; }
setMsg({type:"success",text:editAgent?"Agent updated!":"Agent created!"});
    const me = await api("me",{});
    if(me.ok){ setAgents(me.agents||[]); refreshAgents&&refreshAgents(me.agents||[]); }
    setTimeout(()=>setMode("list"),1200);
  }

  async function doAddById(agentId) {
  if(!agentId.trim()){ setMsg({type:"error",text:"Enter an Agent ID"}); return; }
  setSaving(true); setMsg({type:"",text:""});
  try {
    const r = await api("addAgentById",{agentId:agentId.trim()});
    if(!r.ok){
      setMsg({type:"error",text:r.message||r.error||"Failed to add agent."});
      return;
    }
    const me = await api("me",{});
    if(me.ok){
      setAgents(me.agents||[]);
      refreshAgents&&refreshAgents(me.agents||[]);
      const newAgent = (me.agents||[]).find(a=>a.agentCode===r.agentCode);
      if(newAgent) setAddedAgentForQual(newAgent);
    }
    setMsg({type:"success",text:"Agent added! Now set qualification rules."});
  } catch(e) {
    setMsg({type:"error",text:"Network error: "+e.message});
  } finally {
    setSaving(false);
  }
}

  if(mode==="create"||mode==="edit") return <TLAgentWizard user={user} editAgent={editAgent} onSave={doSave} onBack={()=>setMode("list")} saving={saving} msg={msg} setMsg={setMsg}/>;
  if(mode==="qualEdit") return <TLQualEditor agent={editAgent} onBack={()=>setMode("list")} onSaved={async()=>{ const me=await api("me",{}); if(me.ok){setAgents(me.agents||[]);refreshAgents&&refreshAgents(me.agents||[]);} setMode("list"); }}/>;
  if(mode==="addById") return <TLAddByIdView
  onBack={()=>{ setMode("list"); setMsg({type:"",text:""}); setAddedAgentForQual(null); }}
  onAdd={doAddById}
  saving={saving}
  msg={msg}
  addedAgent={addedAgentForQual}
/>;

  return (
    <div className="t-fade">
      <div className="t-mast">
        <div><div className="t-mast-title">Agents</div><div className="t-mast-sub">Your calling agents · {myAgents.length} total</div></div>
        <div style={{display:"flex",gap:8}}>
          <button className="t-btn t-btn-outline t-btn-sm" style={{background:"#fff",color:"var(--black)",fontFamily:"var(--fd)",fontWeight:900,fontSize:11,padding:"8px 18px"}} onClick={()=>{ setMode("addById"); setMsg({type:"",text:""}); }}>+ Add by Agent ID</button>
          <button className="t-btn" style={{background:"#fff",color:"var(--black)",fontFamily:"var(--fd)",fontWeight:900,fontSize:11,padding:"8px 18px"}} onClick={()=>{ setEditAgent(null); setMsg({type:"",text:""}); setMode("create"); }}>+ Create new Agent</button>
        </div>
      </div>

      {/* Tabs: My Active / My Inactive */}
      <div style={{padding:"0 20px 0",display:"flex",alignItems:"center",gap:16,background:"#fff",borderBottom:"1px solid var(--border)"}}>
        <div style={{display:"flex",gap:4}}>
          {[{id:"active",label:`My Active (${activeList.length})`},{id:"drafts",label:`Inactive (${draftList.length})`}].map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"10px 16px",fontFamily:"var(--fd)",fontWeight:700,fontSize:12,border:"none",borderBottom:tab===t.id?"2.5px solid var(--black)":"2.5px solid transparent",background:"none",cursor:"pointer",color:tab===t.id?"var(--black)":"var(--muted)",marginBottom:-1}}>
              {t.label}
            </button>
          ))}
        </div>
        <div style={{flex:1}}/>
        <input className="t-input" style={{width:220,fontSize:12,padding:"6px 10px"}} placeholder="Search by agent name…" value={search} onChange={e=>setSearch(e.target.value)}/>
      </div>

      {/* MY agents grid */}
      <div style={{padding:20,display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(320px,1fr))",gap:16}}>
        {shown.map(agent=>{
          const st = stats[agent.agentCode]||{};
          const connRate = st.total>0 ? Math.round((st.connected/st.total)*100) : 0;
          const qualRuleCount = (agent.qualificationRules||[]).length;
          return (
            <div key={agent.agentCode} style={{background:"#fff",border:"1.5px solid var(--border)",borderRadius:12,overflow:"hidden",position:"relative"}}>
              
  {!agent.addedById && (
  <button onClick={()=>{ setEditAgent(agent); setMsg({type:"",text:""}); setMode("edit"); }} style={{position:"absolute",top:12,right:12,background:"#f5f5f5",border:"1px solid #e0e0e0",borderRadius:6,width:30,height:30,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:14}}>✏️</button>
)}
              <div style={{padding:"20px 20px 14px"}}>
                <div style={{width:56,height:56,borderRadius:12,background:`hsl(${agent.agentCode.charCodeAt(0)*37%360},60%,55%)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,marginBottom:12}}>🎙️</div>
                <div style={{fontFamily:"var(--fd)",fontWeight:900,fontSize:16,marginBottom:2}}>{agent.displayName}</div>
                <div style={{fontSize:11,color:"var(--muted)",fontFamily:"var(--fm)",marginBottom:8}}>{agent.voicePersona||"—"}, {agent.language} · <span style={{fontFamily:"var(--fm)",color:"#888"}}>{agent.agentCode}</span></div>
                <div style={{fontSize:11,color:"var(--muted)",lineHeight:1.5,display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical",overflow:"hidden"}}>{agent.description||"No description."}</div>
              </div>
              <div style={{borderTop:"1px solid #f0f0f0",padding:"10px 20px",display:"flex",gap:16,alignItems:"center"}}>
                <div style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:"var(--muted)"}}>
                  <span style={{fontSize:14}}>📋</span><span><b style={{color:"var(--black)"}}>{st.campaigns||0}</b> Campaigns</span>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:"var(--muted)"}}>
                  <span style={{fontSize:14}}>📡</span><span><b style={{color:"var(--black)"}}>{connRate}%</b> Connection rate</span>
                </div>
              </div>
              <div style={{borderTop:"1px solid #f0f0f0",padding:"10px 20px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div style={{fontSize:11,color:"var(--muted)"}}>
                  {qualRuleCount>0
                    ? <span style={{color:"var(--green)",fontWeight:700}}>✓ {qualRuleCount} qual rule{qualRuleCount>1?"s":""}</span>
                    : <span style={{color:"var(--red)"}}>⚠ No qualification rules</span>
                  }
                </div>
                <button className="t-btn t-btn-outline t-btn-sm" onClick={()=>{ setEditAgent(agent); setMode("qualEdit"); }}>Edit Rules</button>
              </div>
            </div>
          );
        })}
        {shown.length===0 && (
          <div style={{gridColumn:"1/-1",padding:"48px 0",textAlign:"center"}}>
            <div style={{fontSize:40,marginBottom:12}}>🤖</div>
            <div style={{fontFamily:"var(--fd)",fontWeight:900,fontSize:16,marginBottom:8}}>
              {tab==="active"?"No active agents":"No inactive agents"}
            </div>
            <div style={{fontSize:12,color:"var(--muted)",marginBottom:20}}>Create a new agent or add one by Agent ID</div>
            <button className="t-btn t-btn-black" onClick={()=>{ setEditAgent(null); setMsg({type:"",text:""}); setMode("create"); }}>+ Create new Agent</button>
          </div>
        )}
      </div>

      {/* Agents visible to recruiters (added by TL/IC on team) — only show for TL context */}
      {othersAgents.length > 0 && (
        <div style={{borderTop:"2px solid var(--black)"}}>
          <div className="agent-group-hd">
            <span>Added through Agent ID</span>
            <span style={{fontWeight:400,color:"var(--muted)",fontSize:9}}>{othersAgents.length} agent{othersAgents.length!==1?"s":""} linked by other TL/ICs on your team</span>
          </div>
          <div style={{padding:"12px 20px",display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:12}}>
            {othersAgents.map(agent=>(
              <div key={agent.agentCode} style={{background:"#fafafa",border:"1.5px solid #e0e0e0",borderRadius:8,padding:14}}>
                <div style={{fontFamily:"var(--fd)",fontWeight:700,fontSize:13,marginBottom:2,color:"var(--black)"}}>{agent.displayName}</div>
                <div style={{fontSize:10,color:"var(--black)",fontFamily:"var(--fm)",marginBottom:4}}>{agent.agentCode}</div>
                <div style={{fontSize:10,color:"var(--muted)"}}>Added by: <span style={{fontWeight:600,color:"var(--black)"}}>{agent.createdBy}</span></div>
                <div style={{marginTop:6,fontSize:10,color:"var(--muted)"}}>Recruiters on your team can use this agent</div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ── TL Qual Editor (standalone) ──
function TLQualEditor({ agent, onBack, onSaved }) {
  const resultFields = useMemo(()=>{
    const s=agent?.resultSchema||{};
    if(s.properties) return Object.keys(s.properties);
    return Object.keys(s).filter(k=>k!=="type"&&k!=="required");
  },[agent]);

  const [qualRules, setQualRules] = useState(()=>{
    const rules={};
    if(agent?.qualificationRules?.length){ agent.qualificationRules.forEach(r=>{ if(r.field) rules[r.field]=r.keywords||[]; }); }
    else if(agent?.qualificationField){ rules[agent.qualificationField]=agent.qualificationValues||[]; }
    return rules;
  });
  const [kwInputs,setKwInputs]=useState({});
  const [saving,setSaving]=useState(false);
  const [msg,setMsg]=useState({type:"",text:""});

  function toggleField(f){ setQualRules(p=>{ const n={...p}; if(n[f]!==undefined)delete n[f]; else n[f]=[]; return n; }); }
  function addKw(f){ const kw=(kwInputs[f]||"").trim(); if(!kw)return; setQualRules(p=>({...p,[f]:[...(p[f]||[]),kw]})); setKwInputs(p=>({...p,[f]:""})); }
  function removeKw(f,kw){ setQualRules(p=>({...p,[f]:(p[f]||[]).filter(k=>k!==kw)})); }

  async function save(){
    setSaving(true); setMsg({type:"",text:""});
    const rules=Object.entries(qualRules).filter(([f])=>f).map(([field,keywords])=>({field,keywords}));
    const r=await api("upsertMyAgent",{agent:{agentCode:agent.agentCode,agentId:agent.agentId,qualificationRules:rules,qualificationField:rules[0]?.field||"",qualificationValues:rules.flatMap(r=>r.keywords),qualificationValue:rules.flatMap(r=>r.keywords)[0]||""}});
    setSaving(false);
    if(!r.ok){ setMsg({type:"error",text:r.message||r.error}); return; }
setMsg({type:"success",text:"Rules saved!"}); setTimeout(onSaved,900);
  }

  return (
    <div className="t-fade">
      <div style={{background:"#fff",borderBottom:"1.5px solid #eee",padding:"12px 24px",display:"flex",alignItems:"center",gap:12}}>
        <button style={{background:"none",border:"none",cursor:"pointer",fontFamily:"var(--fd)",fontWeight:700,fontSize:12}} onClick={onBack}>← Back</button>
        <span style={{fontFamily:"var(--fd)",fontWeight:900,fontSize:14}}>Qualification Rules — {agent?.displayName}</span>
      </div>
      <div style={{padding:24,maxWidth:600}}>
        {resultFields.length===0
          ? <Alert type="info">No result schema fields defined. Edit the agent first to add result fields.</Alert>
          : (
            <>
              <div style={{marginBottom:16}}>
                <label className="t-label" style={{marginBottom:8}}>Select fields that determine a qualified lead:</label>
                <div style={{border:"1.5px solid var(--black)",background:"#fff"}}>
                  {resultFields.map(f=>{
                    const isSel=qualRules[f]!==undefined;
                    return (
                      <label key={f} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderBottom:"1px solid #f5f5f5",cursor:"pointer",background:isSel?"#f0f5ff":"transparent"}}>
                        <input type="checkbox" checked={isSel} onChange={()=>toggleField(f)} style={{width:14,height:14}}/>
                        <span style={{flex:1,fontFamily:"var(--fm)",fontSize:13}}>{f}</span>
                        {isSel && <span style={{fontSize:9,fontFamily:"var(--fd)",fontWeight:700,color:"var(--blue)",letterSpacing:".08em"}}>ACTIVE</span>}
                      </label>
                    );
                  })}
                </div>
              </div>
              {Object.keys(qualRules).map(field=>{
                const kws=qualRules[field]||[];
                return (
                  <div key={field} style={{border:"1.5px solid #0066b3",padding:"12px 14px",marginBottom:12,background:"#f0f8ff"}}>
                    <div style={{fontFamily:"var(--fm)",fontSize:13,fontWeight:700,color:"var(--blue)",marginBottom:6}}>{field}</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:8}}>
                      {kws.map(kw=><span key={kw} className="t-kwtag">~{kw}<button className="t-kwtag-rm" onClick={()=>removeKw(field,kw)}>×</button></span>)}
                      {kws.length===0 && <span style={{fontSize:11,color:"var(--muted)",fontStyle:"italic"}}>Any non-empty value qualifies</span>}
                    </div>
                    <div style={{display:"flex",gap:6}}>
                      <input className="t-input" style={{flex:1,fontSize:12,padding:"6px 10px"}} value={kwInputs[field]||""} placeholder="Add keyword…" onChange={e=>setKwInputs(p=>({...p,[field]:e.target.value}))} onKeyDown={e=>{if(e.key==="Enter"){e.preventDefault();addKw(field);}}}/>
                      <button className="t-btn t-btn-black t-btn-sm" onClick={()=>addKw(field)}>+ Add</button>
                    </div>
                  </div>
                );
              })}
            </>
          )
        }
        {msg.text && <div style={{marginBottom:12}}><Alert type={msg.type==="error"?"error":"success"}>{msg.text}</Alert></div>}
        <div style={{display:"flex",gap:10}}>
          <button className="t-btn t-btn-outline" onClick={onBack}>Cancel</button>
          <button className="t-btn t-btn-black" disabled={saving} onClick={save}>{saving?<Spin/>:"Save Rules"}</button>
        </div>
      </div>
    </div>
  );
}

// ── Add by Agent ID ──
function TLAddByIdView({ onBack, onAdd, saving, msg, addedAgent }) {
  const [agentId, setAgentId] = useState("");
  const [qualRules, setQualRules] = useState({});
  const [kwInputs, setKwInputs] = useState({});
  const [savingQual, setSavingQual] = useState(false);
  const [qualMsg, setQualMsg] = useState({type:"",text:""});

  const isValidUUID = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(agentId.trim());

  const resultFields = useMemo(()=>{
    const s = addedAgent?.resultSchema||{};
    if(s.properties) return Object.keys(s.properties);
    return Object.keys(s).filter(k=>k!=="type"&&k!=="required");
  },[addedAgent]);

  function toggleQF(f){ setQualRules(p=>{ const n={...p}; if(n[f]!==undefined)delete n[f]; else n[f]=[]; return n; }); }
  function addKw(f){ const kw=(kwInputs[f]||"").trim(); if(!kw)return; setQualRules(p=>({...p,[f]:[...(p[f]||[]),kw]})); setKwInputs(p=>({...p,[f]:""})); }
  function rmKw(f,kw){ setQualRules(p=>({...p,[f]:(p[f]||[]).filter(k=>k!==kw)})); }

  async function saveQualRules(){
    if(!addedAgent) return;
    setSavingQual(true); setQualMsg({type:"",text:""});
    const rules = Object.entries(qualRules).filter(([f])=>f).map(([field,keywords])=>({field,keywords}));
    const r = await api("upsertMyAgent",{agent:{agentCode:addedAgent.agentCode,agentId:addedAgent.agentId,qualificationRules:rules,qualificationField:rules[0]?.field||"",qualificationValues:rules.flatMap(r=>r.keywords),qualificationValue:rules.flatMap(r=>r.keywords)[0]||""}});
    setSavingQual(false);
    if(!r.ok){ setQualMsg({type:"error",text:r.message||r.error}); return; }
    setQualMsg({type:"success",text:"Rules saved!"});
    setTimeout(onBack, 900);
  }

  // ── Step 1: Enter Agent ID ──
  if(!addedAgent) return (
    <div className="t-fade">
      <div style={{background:"#fff",borderBottom:"1.5px solid #eee",padding:"12px 24px",display:"flex",alignItems:"center",gap:12}}>
        <button style={{background:"none",border:"none",cursor:"pointer",fontFamily:"var(--fd)",fontWeight:700,fontSize:12}} onClick={onBack}>← Back</button>
        <span style={{fontFamily:"var(--fd)",fontWeight:900,fontSize:14}}>Add Existing Agent by ID</span>
      </div>
      <div style={{padding:32,maxWidth:480}}>
        <p style={{fontSize:13,color:"var(--muted)",lineHeight:1.7,marginBottom:24}}>
          If an agent has already been created in the Hunar platform, you can add it to your list by entering its Agent ID below.
        </p>
        <div style={{marginBottom:8}}>
          <label className="t-label" style={{marginBottom:6}}>Hunar Agent ID <span style={{color:"var(--red)"}}>*</span></label>
          <input className="t-input" style={{fontSize:13,padding:"10px 12px",fontFamily:"var(--fm)",borderColor:agentId&&!isValidUUID?"var(--red)":"var(--border)"}} placeholder="e.g. 3f2504e0-4f89-11d3-9a0c-0305e82c3301" value={agentId} onChange={e=>setAgentId(e.target.value)}/>
          <div style={{fontSize:10,marginTop:4,color:agentId&&!isValidUUID?"var(--red)":"var(--muted)"}}>
            {agentId&&!isValidUUID?"⚠ Must be UUID format: xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx":"Find this in the Hunar dashboard under agent settings."}
          </div>
        </div>
        {msg.text && <div style={{marginBottom:12}}><Alert type={msg.type==="error"?"error":msg.type==="success"?"success":"info"}>{msg.text}</Alert></div>}
        <div style={{display:"flex",gap:10,marginTop:16}}>
          <button className="t-btn t-btn-outline" onClick={onBack}>Cancel</button>
          <button className="t-btn t-btn-black" disabled={saving||!isValidUUID} onClick={()=>onAdd(agentId)}>{saving?<Spin/>:"Add Agent"}</button>
        </div>
      </div>
    </div>
  );

  // ── Step 2: Set qual rules ──
  return (
    <div className="t-fade">
      <div style={{background:"#fff",borderBottom:"1.5px solid #eee",padding:"12px 24px",display:"flex",alignItems:"center",gap:12}}>
        <span style={{fontFamily:"var(--fd)",fontWeight:900,fontSize:14}}>Set Qualification Rules — {addedAgent.displayName}</span>
        <span style={{background:"var(--green)",color:"#fff",fontSize:9,fontFamily:"var(--fd)",fontWeight:700,padding:"2px 8px"}}>ADDED ✓</span>
      </div>
      <div style={{padding:28,maxWidth:560}}>
        <div style={{background:"#f0fff7",border:"1.5px solid #6ee7b7",padding:"10px 14px",marginBottom:20,fontSize:12,color:"#065f46"}}>
          ✓ Agent added! Set qualification rules below, or skip and set them later via "Edit Rules".
        </div>
        {resultFields.length===0
          ? <Alert type="info">No result schema fields on this agent. You can set rules later via Edit Rules.</Alert>
          : (
            <>
              <label className="t-label" style={{marginBottom:8}}>Select fields that mark a lead as qualified:</label>
              <div style={{border:"1.5px solid var(--black)",marginBottom:14}}>
                {resultFields.map(f=>{
                  const isSel=qualRules[f]!==undefined;
                  return (
                    <label key={f} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",borderBottom:"1px solid #f5f5f5",cursor:"pointer",background:isSel?"#f0f5ff":"transparent"}}>
                      <input type="checkbox" checked={isSel} onChange={()=>toggleQF(f)} style={{width:13,height:13}}/>
                      <span style={{flex:1,fontFamily:"var(--fm)",fontSize:12}}>{f}</span>
                      {isSel&&<span style={{fontSize:9,color:"var(--blue)",fontFamily:"var(--fd)",fontWeight:700}}>ACTIVE</span>}
                    </label>
                  );
                })}
              </div>
              {Object.keys(qualRules).map(field=>{
                const kws=qualRules[field]||[];
                return (
                  <div key={field} style={{border:"1.5px solid #0066b3",padding:"11px 13px",marginBottom:10,background:"#f0f8ff"}}>
                    <div style={{fontFamily:"var(--fm)",fontSize:12,fontWeight:700,color:"var(--blue)",marginBottom:6}}>{field}</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:7}}>
                      {kws.map(kw=><span key={kw} className="t-kwtag">~{kw}<button className="t-kwtag-rm" onClick={()=>rmKw(field,kw)}>×</button></span>)}
                      {kws.length===0&&<span style={{fontSize:10,color:"var(--muted)",fontStyle:"italic"}}>Any non-empty value qualifies</span>}
                    </div>
                    <div style={{display:"flex",gap:6}}>
                      <input className="t-input" style={{flex:1,fontSize:11,padding:"5px 8px"}} value={kwInputs[field]||""} placeholder="Add keyword (e.g. yes, interested)…" onChange={e=>setKwInputs(p=>({...p,[field]:e.target.value}))} onKeyDown={e=>{if(e.key==="Enter"){e.preventDefault();addKw(field);}}}/>
                      <button className="t-btn t-btn-black t-btn-sm" onClick={()=>addKw(field)}>+ Add</button>
                    </div>
                  </div>
                );
              })}
            </>
          )
        }
        {qualMsg.text && <div style={{marginBottom:12}}><Alert type={qualMsg.type==="error"?"error":"success"}>{qualMsg.text}</Alert></div>}
        <div style={{display:"flex",gap:10,marginTop:16}}>
          <button className="t-btn t-btn-outline" onClick={onBack}>Skip for now</button>
          <button className="t-btn t-btn-black" disabled={savingQual} onClick={saveQualRules}>{savingQual?<Spin/>:"Save Rules & Finish"}</button>
        </div>
      </div>
    </div>
  );
}

// ── Full agent wizard for TL/IC ──
function TLAgentWizard({ user, editAgent, onSave, onBack, saving, msg, setMsg }) {
  const [step, setStep] = useState(1);
  const STEPS = ["Persona Details","Call Agent","Result Agent","Qualification"];

  const initForm = ()=> editAgent ? {
    displayName: editAgent.displayName||"",
    language: editAgent.language||"ENGLISH",
    voicePersona: editAgent.voicePersona||"NEHA",
    objective: editAgent.description||"",
    introduction: editAgent.introduction||"{greeting}, Am I speaking to {callee_name}?",
    agentPrompt: editAgent.agentPrompt||"",
    resultPrompt: editAgent.resultPrompt||"",
    resultFields: (()=>{ const s=editAgent.resultSchema||{}; const keys=s.properties?Object.keys(s.properties):Object.keys(s).filter(k=>k!=="type"&&k!=="required"); return keys.map(k=>({name:k,expected:s.properties?s.properties[k]?.description||"":s[k]||""})); })(),
  } : {displayName:"",language:"ENGLISH",voicePersona:"NEHA",objective:"",introduction:"{greeting}, Am I speaking to {callee_name}?",agentPrompt:"",resultPrompt:"",resultFields:[]};

  const [form, setForm] = useState(initForm);

  const initQR = ()=>{
    if(!editAgent) return {};
    const rules={};
    if(editAgent.qualificationRules?.length){ editAgent.qualificationRules.forEach(r=>{ if(r.field) rules[r.field]=r.keywords||[]; }); }
    else if(editAgent.qualificationField){ rules[editAgent.qualificationField]=editAgent.qualificationValues||[]; }
    return rules;
  };
  const [qualRules,setQualRules]=useState(initQR);
  const [kwInputs,setKwInputs]=useState({});

  function toggleQF(f){ setQualRules(p=>{ const n={...p}; if(n[f]!==undefined)delete n[f]; else n[f]=[]; return n; }); }
  function addKw2(f){ const kw=(kwInputs[f]||"").trim(); if(!kw)return; setQualRules(p=>({...p,[f]:[...(p[f]||[]),kw]})); setKwInputs(p=>({...p,[f]:""})); }
  function rmKw(f,kw){ setQualRules(p=>({...p,[f]:(p[f]||[]).filter(k=>k!==kw)})); }
  function addRF(){ setForm(f=>({...f,resultFields:[...f.resultFields,{name:"",expected:""}]})); }
  function updateRF(i,k,v){ setForm(f=>{ const rf=[...f.resultFields]; rf[i]={...rf[i],[k]:v}; return{...f,resultFields:rf}; }); }
  function removeRF(i){ setForm(f=>({...f,resultFields:f.resultFields.filter((_,j)=>j!==i)})); }

  const definedFields = form.resultFields.filter(f=>f.name.trim()).map(f=>f.name.trim());

  function Preview() {
    return (
      <div style={{width:220,borderLeft:"1.5px solid #eee",padding:"24px 18px",flexShrink:0,background:"#fafafa"}}>
        <div style={{fontFamily:"var(--fd)",fontWeight:700,fontSize:10,color:"var(--muted)",letterSpacing:".18em",textTransform:"uppercase",marginBottom:16}}>Preview</div>
        <div style={{fontFamily:"var(--fd)",fontWeight:900,fontSize:18,marginBottom:14,wordBreak:"break-word"}}>{form.displayName||<span style={{color:"#ccc"}}>Agent Name</span>}</div>
        <div style={{fontSize:11,color:"var(--muted)",marginBottom:8}}><b>Language:</b> {form.language||"—"}</div>
        <div style={{fontSize:11,color:"var(--muted)",marginBottom:8}}><b>Persona:</b> <span style={{display:"inline-flex",alignItems:"center",gap:4,background:"#efefef",padding:"2px 8px",borderRadius:4,fontWeight:700}}>{form.voicePersona||"—"} ▷</span></div>
        {definedFields.length>0 && <div style={{marginTop:10}}><div style={{fontFamily:"var(--fd)",fontWeight:700,fontSize:9,color:"var(--muted)",letterSpacing:".12em",marginBottom:4}}>RESULT FIELDS</div>{definedFields.map(f=><div key={f} style={{fontFamily:"var(--fm)",fontSize:10,color:"#1a6fdc",marginBottom:2}}>{f}</div>)}</div>}
        {Object.keys(qualRules).length>0 && <div style={{marginTop:10}}><div style={{fontFamily:"var(--fd)",fontWeight:700,fontSize:9,color:"var(--muted)",letterSpacing:".12em",marginBottom:4}}>QUAL RULES</div>{Object.entries(qualRules).map(([f,kws])=><div key={f} style={{fontSize:10,marginBottom:2}}><span style={{color:"var(--blue)",fontWeight:700}}>{f}</span>{kws.length>0&&kws.map(kw=><span key={kw} style={{fontSize:8,background:"#dbeafe",color:"#1e40af",padding:"1px 4px",borderRadius:2,marginLeft:3}}>{kw}</span>)}</div>)}</div>}
        <div style={{marginTop:14}}><div style={{fontFamily:"var(--fd)",fontWeight:700,fontSize:9,color:"var(--muted)",letterSpacing:".12em",marginBottom:4}}>PRESET VARS</div>{["{greeting}","{persona_name}","{callee_name}","{mobile_number}"].map(v=><div key={v} style={{fontFamily:"var(--fm)",fontSize:10,color:"#6739b7",marginBottom:1}}>{v}</div>)}</div>

                <span style={{fontFamily:"var(--fd)",fontWeight:700,fontSize:11,whiteSpace:"nowrap",color:active?"var(--black)":done?"var(--green)":"#aaa"}}>{label}</span>
              </div>

      </div>
      <div style={{flex:1,overflowY:"auto",background:"#fff"}}>
        {/* Step 1 */}
        {step===1 && (
          <div style={{padding:"28px 32px",maxWidth:520}}>
            <h2 style={{fontFamily:"var(--fd)",fontWeight:900,fontSize:20,marginBottom:24}}>Persona Details</h2>
            <div style={{marginBottom:16}}><label className="t-label" style={{marginBottom:5}}>Agent name <span style={{color:"var(--red)"}}>*</span></label><input className="t-input" style={{fontSize:13}} placeholder="e.g. Hiring Outreach Agent" value={form.displayName} onChange={e=>setForm({...form,displayName:e.target.value})}/></div>
            <div style={{marginBottom:16}}><label className="t-label" style={{marginBottom:5}}>Language <span style={{color:"var(--red)"}}>*</span></label><select className="t-select" style={{width:"100%",fontSize:13}} value={form.language} onChange={e=>setForm({...form,language:e.target.value})}><option value="">Select…</option>{LANGUAGES.map(l=><option key={l} value={l}>{l.charAt(0)+l.slice(1).toLowerCase()}</option>)}</select></div>
            <div style={{marginBottom:28}}><label className="t-label" style={{marginBottom:8}}>Voice Persona <span style={{color:"var(--red)"}}>*</span></label><div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{VOICE_PERSONAS.map(p=><button key={p} onClick={()=>setForm({...form,voicePersona:p})} style={{padding:"7px 16px",border:"2px solid",borderRadius:20,fontFamily:"var(--fd)",fontWeight:700,fontSize:11,cursor:"pointer",borderColor:form.voicePersona===p?"var(--black)":"var(--border)",background:form.voicePersona===p?"var(--black)":"#fff",color:form.voicePersona===p?"#fff":"var(--black)"}}>{p}</button>)}</div></div>
            <div style={{display:"flex",justifyContent:"space-between"}}><button className="t-btn t-btn-outline" onClick={onBack}>Cancel</button><button className="t-btn t-btn-black" style={{borderRadius:20}} disabled={!form.displayName||!form.language||!form.voicePersona} onClick={()=>setStep(2)}>Proceed to Call Agent →</button></div>
          </div>
        )}
        {step===2 && (
          <div style={{display:"flex",flex:1}}>
            <div style={{flex:1,padding:"28px 32px",overflowY:"auto"}}>
              <h2 style={{fontFamily:"var(--fd)",fontWeight:900,fontSize:20,marginBottom:24}}>Set Up Call Agent</h2>
              <div style={{marginBottom:14}}><label className="t-label" style={{marginBottom:5}}>Objective <span style={{color:"var(--red)"}}>*</span></label><input className="t-input" style={{fontSize:12}} maxLength={140} placeholder="e.g. Qualify candidates for field sales in Bangalore" value={form.objective} onChange={e=>setForm({...form,objective:e.target.value})}/><div style={{textAlign:"right",fontSize:9,color:"var(--muted)",marginTop:1}}>{form.objective.length}/140</div></div>
              <div style={{marginBottom:14}}><label className="t-label" style={{marginBottom:5}}>Introductory Statement <span style={{color:"var(--red)"}}>*</span></label><input className="t-input" style={{fontSize:12,color:"#6739b7"}} value={form.introduction} onChange={e=>setForm({...form,introduction:e.target.value})}/></div>
              <div style={{marginBottom:20}}>
                <label className="t-label" style={{marginBottom:5}}>Call Prompt <span style={{color:"var(--red)"}}>*</span></label>
                <div style={{background:"#fffbeb",border:"1px solid #fcd34d",padding:"7px 10px",fontSize:10,color:"#92400e",marginBottom:6}}>📌 Define the agent persona, context, and expected call flow.</div>
                <textarea className="t-input" rows={14} style={{fontSize:11,fontFamily:"var(--fm)",resize:"vertical",lineHeight:1.6}} placeholder={"1. My Identity\n2. Context\n3. Conversation Flow"} value={form.agentPrompt} onChange={e=>setForm({...form,agentPrompt:e.target.value})}/>
              </div>
              <div style={{display:"flex",justifyContent:"space-between"}}><button className="t-btn t-btn-outline" onClick={()=>setStep(1)}>← Back</button><button className="t-btn t-btn-black" disabled={!form.objective||!form.agentPrompt} onClick={()=>setStep(3)}>Proceed to Result Agent →</button></div>
            </div>
            <Preview/>
          </div>
        )}
        {step===3 && (
          <div style={{display:"flex",flex:1}}>
            <div style={{flex:1,padding:"28px 32px",overflowY:"auto"}}>
              <h2 style={{fontFamily:"var(--fd)",fontWeight:900,fontSize:20,marginBottom:24}}>Result Agent Set Up</h2>
              <div style={{marginBottom:20}}>
                <label className="t-label" style={{marginBottom:8}}>Result Values <span style={{color:"var(--red)"}}>*</span></label>
                <div style={{border:"1.5px solid var(--black)",overflow:"hidden",marginBottom:8}}>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                    <thead><tr style={{background:"var(--black)"}}><th style={{padding:"7px 10px",color:"#fff",fontFamily:"var(--fd)",fontWeight:700,fontSize:9,letterSpacing:".12em",textAlign:"left",width:32}}>No</th><th style={{padding:"7px 10px",color:"#fff",fontFamily:"var(--fd)",fontWeight:700,fontSize:9,letterSpacing:".12em",textAlign:"left"}}>Column Name</th><th style={{padding:"7px 10px",color:"#fff",fontFamily:"var(--fd)",fontWeight:700,fontSize:9,letterSpacing:".12em",textAlign:"left"}}>Expected Values</th><th style={{width:30}}/></tr></thead>

                        </tr>

                    </tbody>

                </div>
                <button className="t-btn t-btn-outline t-btn-sm" onClick={addRF}>+ Add More</button>
              </div>
              <div style={{marginBottom:20}}>
                <label className="t-label" style={{marginBottom:5}}>Result Prompt <span style={{color:"var(--red)"}}>*</span></label>
                <textarea className="t-input" rows={10} style={{fontSize:11,fontFamily:"var(--fm)",resize:"vertical",lineHeight:1.6}} placeholder={"Evaluate the call and extract key information."} value={form.resultPrompt} onChange={e=>setForm({...form,resultPrompt:e.target.value})}/>
              </div>
              <div style={{display:"flex",justifyContent:"space-between"}}><button className="t-btn t-btn-outline" onClick={()=>setStep(2)}>← Back</button><button className="t-btn t-btn-black" disabled={form.resultFields.filter(f=>f.name).length===0||!form.resultPrompt} onClick={()=>setStep(4)}>Proceed to Qualification →</button></div>
            </div>
            <Preview/>
          </div>
        )}
        {step===4 && (
          <div style={{display:"flex",flex:1}}>
            <div style={{flex:1,padding:"28px 32px",overflowY:"auto"}}>
              <h2 style={{fontFamily:"var(--fd)",fontWeight:900,fontSize:20,marginBottom:8}}>Qualification Rules</h2>
              <p style={{fontSize:12,color:"var(--muted)",marginBottom:20,lineHeight:1.6}}>Choose which result fields determine a qualified lead.</p>
              {definedFields.length===0
                ? <Alert type="info">← Go back and define at least one result field first.</Alert>
                : (
                  <>
                    <div style={{border:"1.5px solid var(--black)",marginBottom:14}}>
                      <div style={{padding:"7px 12px",background:"#f5f5f5",borderBottom:"1px solid #eee",fontFamily:"var(--fd)",fontWeight:700,fontSize:9,letterSpacing:".15em",textTransform:"uppercase",color:"var(--muted)"}}>Select qualification fields</div>
                      {definedFields.map(f=>{
                        const isSel=qualRules[f]!==undefined;
                        return (<label key={f} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",borderBottom:"1px solid #f5f5f5",cursor:"pointer",background:isSel?"#f0f5ff":"transparent"}}><input type="checkbox" checked={isSel} onChange={()=>toggleQF(f)} style={{width:13,height:13}}/><span style={{flex:1,fontFamily:"var(--fm)",fontSize:12}}>{f}</span>{isSel&&<span style={{fontSize:9,color:"var(--blue)",fontFamily:"var(--fd)",fontWeight:700,letterSpacing:".08em"}}>ACTIVE</span>}</label>);
                      })}
                    </div>
                    {Object.keys(qualRules).map(field=>{
                      const kws=qualRules[field]||[];
                      return (
                        <div key={field} style={{border:"1.5px solid #0066b3",padding:"11px 13px",marginBottom:10,background:"#f0f8ff"}}>
                          <div style={{fontFamily:"var(--fm)",fontSize:12,fontWeight:700,color:"var(--blue)",marginBottom:6}}>{field}</div>
                          <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:7}}>
                            {kws.map(kw=><span key={kw} className="t-kwtag">~{kw}<button className="t-kwtag-rm" onClick={()=>rmKw(field,kw)}>×</button></span>)}
                            {kws.length===0&&<span style={{fontSize:10,color:"var(--muted)",fontStyle:"italic"}}>Any non-empty value qualifies</span>}
                          </div>
                          <div style={{display:"flex",gap:6}}><input className="t-input" style={{flex:1,fontSize:11,padding:"5px 8px"}} value={kwInputs[field]||""} placeholder="Add keyword (e.g. yes, interested)…" onChange={e=>setKwInputs(p=>({...p,[field]:e.target.value}))} onKeyDown={e=>{if(e.key==="Enter"){e.preventDefault();addKw2(field);}}}/><button className="t-btn t-btn-black t-btn-sm" onClick={()=>addKw2(field)}>+ Add</button></div>
                        </div>
                      );
                    })}
                  </>
                )
              }
              {msg.text && <div style={{marginBottom:12}}><Alert type={msg.type==="error"?"error":"success"}>{msg.text}</Alert></div>}
              <div style={{display:"flex",justifyContent:"space-between",paddingTop:8}}><button className="t-btn t-btn-outline" onClick={()=>setStep(3)}>← Back</button><button className="t-btn t-btn-black" disabled={saving} onClick={()=>onSave(form,qualRules)}>{saving?<Spin/>:editAgent?"Update Agent":"Create Agent"}</button></div>
            </div>
            <Preview/>
          </div>
        )}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// APP ROOT
// ─────────────────────────────────────────────────────────────
function App() {
  const [view,setView]=useState("dashboard");
  const [user,setUser]=useState(null);
  const [today,setToday]=useState(null);
  const [teams,setTeams]=useState([]);
  const [users,setUsers]=useState([]);
  const [agents,setAgents]=useState([]);
  const [selAgent,setSelAgent]=useState("");
  const [showChangePw,setShowChangePw]=useState(false);
  const [bootScreen,setBootScreen]=useState("boot");
  const [setupToken,setSetupToken]=useState("");
  const [leadsFilter,setLeadsFilter]=useState(null);

  async function refreshMe(){ const r=await api("me",{}); if(r.ok){setUser(r.user);setToday(r.today);setAgents(r.agents||[]);} }
  async function refreshTeams(){ const r=await api("listTeams",{}); if(r.ok)setTeams(r.teams||[]); }
  async function refreshUsers(){
    if(user && user.role!=="recruiter" && user.role!=="individual_contributor"){
      const r=await api("listUsers",{}); if(r.ok)setUsers(r.users||[]);
    }
  }

  useEffect(()=>{
    const params=new URLSearchParams(window.location.search);
    const t=params.get("token");
    if(t){setSetupToken(t);setBootScreen("setup");return;}
    const s=localStorage.getItem("session");
    if(!s){setBootScreen("login");return;}
    (async()=>{
      const r=await api("me",{});
      if(r.ok){setUser(r.user);setToday(r.today);setAgents(r.agents||[]);setBootScreen("app");}
      else{localStorage.removeItem("session");setBootScreen("login");}
    })();
  },[]);

  useEffect(()=>{if(bootScreen==="app"){refreshTeams();refreshUsers();}},[bootScreen,user]);

  async function onLogout(){ await api("logout",{}); localStorage.removeItem("session"); window.location.search=""; }
  function onViewLeads(agentCode, requestId) { setLeadsFilter({agentCode, requestId}); setView("leads"); }

  if(bootScreen==="boot") return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}><Spin/></div>;
  if(bootScreen==="login") return <LoginScreen onLoggedIn={u=>{setUser(u);setBootScreen("app");refreshMe();}} goForgot={()=>setBootScreen("forgot")}/>;
  if(bootScreen==="forgot") return <ForgotScreen goLogin={()=>setBootScreen("login")}/>;
  if(bootScreen==="setup") return <SetupScreen token={setupToken} goLogin={()=>{setBootScreen("login");window.history.replaceState({},"",window.location.pathname);}} onCompleted={u=>{setUser(u);setBootScreen("app");window.history.replaceState({},"",window.location.pathname);refreshMe();}}/>;
  if(!user) return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}><Spin/></div>;

  let content=null;
  if(view==="dashboard") content=<DashboardView user={user} agents={agents} selectedAgent={selAgent} setSelectedAgent={setSelAgent}/>;
  else if(view==="leads") content=<LeadsView user={user} users={users} agents={agents} teams={teams} initialFilter={leadsFilter} onClearFilter={()=>setLeadsFilter(null)}/>;
  else if(view==="trigger") content=<UploadView user={user} agents={agents} refreshMe={refreshMe}/>;
  else if(view==="campaigns") content=<CampaignsView agents={agents} user={user} teams={teams} onViewLeads={onViewLeads}/>;
  else if(view==="myagents") content=<TLAgentsView user={user} agents={agents} refreshAgents={newAgents=>{setAgents(newAgents);}}/>;
  else if(view==="people")     content=<PeopleHub user={user} agents={agents} teams={teams}/>;
  else if(view==="lineup")     content=<InterviewLineupView user={user}/>;
  else if(view==="manual")     content=<ManualTrackerView user={user}/>;
  else if(view==="support")    content=<SupportView user={user}/>;
  else if(view==="agentintel") content=<AgentIntelView user={user} agents={agents}/>;

  return (
    <>
      <Shell user={user} today={today} onLogout={onLogout} view={view} setView={v=>{setView(v);if(v!=="leads")setLeadsFilter(null);}} onChangePw={()=>setShowChangePw(true)}>
        {content}
      </Shell>
      {showChangePw && <ChangePasswordModal onClose={()=>setShowChangePw(false)}/>}
    </>
  );
}
